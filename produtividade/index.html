<html lang="pt-BR">

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
:root{
  --navy:#0B1F3A;--azul:#1A5296;--azul-md:#2E6DA4;--azul-cl:#D6E8F7;
  --bg:#0B1F3A;--cinza-cl:#F7FAFD;--borda:#C4D4E8;--borda-fr:#A8C1DE;
  --texto:#0D1E30;--texto2:#4A6278;--gold:#A18960;--verde:#2D7A3C;
  --sombra:0 2px 14px rgba(11,31,58,0.08);--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--texto);}

.senha-overlay{position:fixed;inset:0;background:linear-gradient(160deg,#0B1F3A,#0d2d55 60%,#0B1F3A);
  display:flex;align-items:center;justify-content:center;z-index:9999;}
.senha-overlay.hidden{display:none;}
.senha-box{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);
  border-radius:20px;padding:48px 40px;width:340px;text-align:center;backdrop-filter:blur(12px);}
.senha-box h2{color:#fff;font-size:20px;margin-bottom:6px;}
.senha-box p{color:rgba(255,255,255,0.5);font-size:13px;margin-bottom:24px;}
.senha-input{width:100%;padding:13px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.08);color:#fff;font-size:15px;text-align:center;
  letter-spacing:3px;outline:none;}
.senha-btn{width:100%;margin-top:12px;padding:13px;border-radius:10px;
  background:linear-gradient(135deg,#1A5296,#0B1F3A);border:none;color:#fff;
  font-size:15px;font-weight:700;cursor:pointer;}
.senha-erro{color:#ff7070;font-size:13px;margin-top:8px;min-height:18px;}

.header{background:#fff;padding:0 32px;min-height:68px;display:flex;
  align-items:center;justify-content:space-between;border-bottom:3px solid var(--azul);
  box-shadow:0 1px 8px rgba(11,31,58,0.04);}
.header-left h1{color:var(--navy);font-size:18px;font-weight:800;}
.header-left p{color:var(--texto2);font-size:12px;margin-top:2px;}
.header-tag{background:var(--azul);color:#fff;font-size:10px;font-weight:700;
  letter-spacing:1px;padding:4px 12px;border-radius:20px;text-transform:uppercase;}

.admin-nav{background:var(--navy);border-bottom:1px solid rgba(255,255,255,0.08);
  padding:10px 32px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.admin-nav-label{color:rgba(255,255,255,0.55);font-size:11px;font-weight:700;
  letter-spacing:0.6px;text-transform:uppercase;}
.admin-nav-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;
  border-radius:20px;font-size:12px;font-weight:600;text-decoration:none;
  border:1.5px solid;transition:all 0.15s;background:#fff;}
.admin-nav-btn.endo{color:var(--azul);border-color:var(--borda-fr);}
.admin-nav-btn.endo:hover{background:var(--azul);color:#fff;border-color:var(--azul);}
.admin-nav-btn.hub{color:#94a3b8;border-color:rgba(148,163,184,0.35);background:rgba(148,163,184,0.08);}
.admin-nav-btn.hub:hover{background:rgba(148,163,184,0.20);border-color:#94a3b8;}
.admin-nav-btn.prod-oxy{color:#6dd5a0;border-color:rgba(109,213,160,0.35);background:rgba(109,213,160,0.08);}
.admin-nav-btn.prod-oxy:hover{background:rgba(109,213,160,0.20);border-color:#6dd5a0;}
.admin-nav-btn.active{opacity:0.85;cursor:default;pointer-events:none;font-weight:700;}
.admin-nav-btn.prod{color:#fff;border-color:var(--azul);background:var(--azul);opacity:0.85;cursor:default;pointer-events:none;}

.main{padding:28px 32px;max-width:1400px;margin:0 auto;}

.periodo-bloco{display:flex;align-items:center;gap:14px;margin-bottom:22px;flex-wrap:wrap;
  background:#fff;padding:14px 18px;border-radius:12px;border:1px solid var(--borda);
  box-shadow:var(--sombra);}
.periodo-label{font-size:11px;font-weight:700;color:var(--texto2);
  letter-spacing:0.5px;text-transform:uppercase;}
.periodo-tabs{display:flex;gap:8px;flex-wrap:wrap;}
.tab{padding:7px 18px;border-radius:20px;border:1.5px solid var(--borda);background:#fff;
  font-size:13px;font-weight:600;cursor:pointer;color:var(--texto2);transition:all 0.15s;}
.tab.active{background:var(--navy);border-color:var(--navy);color:#fff;}
.tab:hover:not(.active){border-color:var(--azul);color:var(--azul);}
.tab.desativa{opacity:0.45;}
.range-sep{width:1px;height:30px;background:var(--borda);}
.range-filter{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.range-filter select{padding:6px 10px;border-radius:8px;border:1.5px solid var(--borda);
  background:#fff;font-size:13px;color:var(--texto);font-weight:600;cursor:pointer;}
.range-filter select:focus{border-color:var(--azul);outline:none;}
.range-ate{font-size:12px;color:var(--texto2);}
.range-btn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;
  cursor:pointer;border:1.5px solid;transition:all 0.15s;}
.range-btn.apply{background:var(--azul);color:#fff;border-color:var(--azul);}
.range-btn.apply:hover{background:var(--navy);border-color:var(--navy);}
.range-btn.clear{background:#fff;color:var(--texto2);border-color:var(--borda);}
.range-btn.clear:hover{background:var(--cinza-cl);}

.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:16px;margin-bottom:22px;}
.kpi{background:#fff;border-radius:12px;padding:18px 20px;box-shadow:var(--sombra);
  border:1px solid var(--borda);border-left:4px solid var(--azul);}
.kpi.gold{border-left-color:var(--gold);}
.kpi.verde{border-left-color:var(--verde);}
.kpi.navy{border-left-color:var(--navy);}
.kpi-label{font-size:11px;color:var(--texto2);font-weight:700;letter-spacing:0.5px;
  text-transform:uppercase;margin-bottom:6px;}
.kpi-val{font-size:22px;font-weight:800;color:var(--navy);}

.grid-main{display:grid;grid-template-columns:1fr 1.8fr;gap:20px;align-items:stretch;margin-bottom:20px;}
@media(max-width:900px){.grid-main{grid-template-columns:1fr;}}
.card-box{background:#fff;border-radius:12px;padding:20px 22px;
  box-shadow:var(--sombra);border:1px solid var(--borda);}
.section-title{font-size:13px;font-weight:800;color:var(--navy);margin-bottom:14px;
  letter-spacing:0.3px;text-transform:uppercase;}
.chart-wrap{position:relative;height:280px;}

.table-wrap{background:#fff;border-radius:12px;box-shadow:var(--sombra);
  border:1px solid var(--borda);overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:var(--cinza-cl);color:var(--navy);font-size:11px;font-weight:800;
  letter-spacing:0.4px;text-transform:uppercase;padding:11px 14px;text-align:left;
  border-bottom:2px solid var(--borda);}
td{padding:12px 14px;border-bottom:1px solid var(--cinza-cl);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--azul-cl);}
.prof-link{color:var(--azul);text-decoration:none;font-weight:700;}
.prof-link:hover{color:var(--navy);text-decoration:underline;}
.val-cell{font-weight:700;text-align:right;white-space:nowrap;color:var(--navy);}
.val-cell.muted{color:var(--texto2);font-weight:500;}
.empty-row td{text-align:center;padding:40px;color:var(--texto2);}
/* mobile-600 */
@media(max-width:600px){
  .header{padding:0 14px;min-height:60px;}
  .header-left h1{font-size:16px;}
  .main{padding:18px 14px;}
  .admin-nav{padding:8px 14px;gap:8px;}
  .admin-nav-btn{padding:4px 10px;font-size:11px;}
  .kpi-val{font-size:19px;}
  .kpi{padding:14px 16px;}
  .chart-wrap{height:220px;}
  .periodo-bloco{padding:12px 14px;gap:10px;}
  .range-filter{gap:6px;}
}
/* mobile-600-v2 */
@media(max-width:600px){
  .kpi-row,.cards,.metrics-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
  .admin-nav,.portais-nav{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .admin-nav::-webkit-scrollbar,.portais-nav::-webkit-scrollbar{display:none;}
  .admin-nav-btn,.portais-nav-btn{flex-shrink:0;}
}
</style>
</head>

    sessionStorage.setItem(SK,'1');
    sessionStorage.setItem('_xpa',val);
    document.getElementById('senha-overlay').classList.add('hidden');
    document.getElementById('conteudo').style.display='block';
    inicializar();
  }else{
    document.getElementById('senha-erro').textContent='Senha incorreta.';
    document.getElementById('senha-input').value='';
    document.getElementById('senha-input').focus();
  }
}
document.getElementById('senha-input').addEventListener('keydown',e=>{if(e.key==='Enter')verificarSenha();});

function pidsDisponiveis(){
  return PORDER.filter(p=>Object.values(DADOS).some(d=>d[p]));
}
function labelOf(pid){
  return Object.values(DADOS).find(d=>d[pid])?.[pid]?.label || pid;
}

function inicializar(){
  const pids = pidsDisponiveis();
  const tabs = document.getElementById('periodo-tabs');
  tabs.innerHTML = '';
  pids.forEach((pid,i)=>{
    const t = document.createElement('button');
    t.className = 'tab' + (i===pids.length-1?' active':'');
    t.textContent = labelOf(pid);
    t.dataset.pid = pid;
    t.onclick = ()=>selecionarMes(pid);
    tabs.appendChild(t);
  });
  const deSel = document.getElementById('range-de');
  const ateSel = document.getElementById('range-ate');
  deSel.innerHTML = ''; ateSel.innerHTML = '';
  pids.forEach(pid=>{
    const lbl = labelOf(pid);
    deSel.insertAdjacentHTML('beforeend', `<option value='${pid}'>${lbl}</option>`);
    ateSel.insertAdjacentHTML('beforeend', `<option value='${pid}'>${lbl}</option>`);
  });
  if(pids.length){
    deSel.value = pids[0];
    ateSel.value = pids[pids.length-1];
    filtroAtual = {tipo:'mes', pid:pids[pids.length-1]};
    render();
  }
}

function selecionarMes(pid){
  filtroAtual = {tipo:'mes', pid};
  document.querySelectorAll('.tab').forEach(t=>{
    t.classList.toggle('active', t.dataset.pid===pid);
    t.classList.remove('desativa');
  });
  render();
}

function aplicarRange(){
  const de = document.getElementById('range-de').value;
  const ate = document.getElementById('range-ate').value;
  const pids = pidsDisponiveis();
  const iDe = pids.indexOf(de), iAte = pids.indexOf(ate);
  if(iDe<0 || iAte<0 || iDe>iAte){ alert('Intervalo inválido. Verifique os meses selecionados.'); return; }
  const selPids = pids.slice(iDe, iAte+1);
  filtroAtual = {tipo:'range', pids:selPids};
  document.querySelectorAll('.tab').forEach(t=>{
    t.classList.remove('active');
    t.classList.add('desativa');
  });
  render();
}

function limparRange(){
  const pids = pidsDisponiveis();
  selecionarMes(pids[pids.length-1]);
}

function agregar(pids){
  const rows = [];
  let totalGlobal=0, atendGlobal=0, pacGlobal=0;
  const pagGlobal = {};
  Object.entries(DADOS).forEach(([prof, periodos])=>{
    let ptotal=0, patend=0, ppac=0;
    pids.forEach(pid=>{
      const r = periodos[pid];
      if(!r) return;
      ptotal += r.total;
      patend += r.n_atend;
      ppac += r.n_pacientes;
      Object.entries(r.por_pagamento).forEach(([tipo, d])=>{
        if(!pagGlobal[tipo]) pagGlobal[tipo] = {valor:0, qtd:0};
        pagGlobal[tipo].valor += d.valor;
        pagGlobal[tipo].qtd += d.qtd;
      });
    });
    if(ptotal>0 || patend>0){
      rows.push({prof, total:ptotal, n_atend:patend, n_pacientes:ppac});
      totalGlobal += ptotal;
      atendGlobal += patend;
      pacGlobal += ppac;
    }
  });
  rows.sort((a,b)=>b.total-a.total);
  return {rows, totalGlobal, atendGlobal, pacGlobal, pagGlobal};
}

function render(){
  const pids = filtroAtual.tipo==='mes' ? [filtroAtual.pid] : filtroAtual.pids;
  const {rows, totalGlobal, atendGlobal, pacGlobal, pagGlobal} = agregar(pids);
  const ticketMedio = pacGlobal>0 ? totalGlobal/pacGlobal : 0;

  document.getElementById('kpi-row').innerHTML = `
    <div class='kpi gold'><div class='kpi-label'>Total Produzido</div><div class='kpi-val'>${br(totalGlobal)}</div></div>
    <div class='kpi navy'><div class='kpi-label'>Ticket Médio</div><div class='kpi-val'>${br(ticketMedio)}</div></div>
    <div class='kpi'><div class='kpi-label'>Profissionais Ativos</div><div class='kpi-val'>${rows.length}</div></div>
    <div class='kpi verde'><div class='kpi-label'>Atendimentos</div><div class='kpi-val'>${atendGlobal}</div></div>
    <div class='kpi'><div class='kpi-label'>Pacientes</div><div class='kpi-val'>${pacGlobal}</div></div>`;

  const tbody = document.getElementById('tbody');
  if(!rows.length){
    tbody.innerHTML = `<tr class='empty-row'><td colspan='6'>Nenhum dado para o período selecionado.</td></tr>`;
  } else {
    tbody.innerHTML = rows.map(r=>{
      const slugged = r.prof.replace(/[^A-Za-z0-9À-ÿ]/g,'_').replace(/^_+|_+$/g,'');
      const tm = r.n_pacientes>0 ? r.total/r.n_pacientes : 0;
      return `<tr>
        <td><strong>${r.prof}</strong></td>
        <td class='val-cell'>${br(r.total)}</td>
        <td style='text-align:right' class='val-cell muted'>${r.n_atend}</td>
        <td style='text-align:right' class='val-cell muted'>${r.n_pacientes}</td>
        <td class='val-cell'>${br(tm)}</td>
        <td><a href='${slugged}_Produtividade.html' class='prof-link'>Abrir →</a></td>
      </tr>`;
    }).join('');
  }

  renderChartPagamento(pagGlobal);
}

function renderChartPagamento(pagGlobal){
  const entries = Object.entries(pagGlobal).sort((a,b)=>b[1].valor-a[1].valor);
  const labels = entries.map(([t])=>t);
  const vals = entries.map(([,d])=>d.valor);
  const coresPag = {
    'Cartão de crédito':'#E07B28',
    'Cartão de débito':'#2980B9',
    'Transferência bancária':'#2D7A3C',
    'Dinheiro':'#8E44AD',
    'Convênio':'#C0392B',
    'PIX':'#16A085'
  };
  const bg = labels.map(l=>coresPag[l]||'#7f8c8d');
  const ctx = document.getElementById('chart-pag');
  if(chartPag) chartPag.destroy();
  if(!labels.length){
    const c = ctx.getContext('2d');
    c.clearRect(0,0,ctx.width,ctx.height);
    c.font='13px Segoe UI'; c.fillStyle='#4A6278'; c.textAlign='center';
    c.fillText('Sem dados de pagamento', ctx.width/2, ctx.height/2);
    return;
  }
  chartPag = new Chart(ctx, {
    type:'doughnut',
    data:{labels, datasets:[{data:vals, backgroundColor:bg, borderWidth:2, borderColor:'#fff'}]},
    options:{
      responsive:true, maintainAspectRatio:false, cutout:'55%',
      plugins:{
        legend:{position:'right', labels:{font:{size:12,weight:'600'}, color:'#0D1E30', boxWidth:14, padding:10}},
        tooltip:{callbacks:{label:ctx=>{
          const tot = ctx.dataset.data.reduce((a,b)=>a+b,0);
          const v = ctx.parsed;
          const pct = tot>0?((v/tot)*100).toFixed(1):'0';
          return ' '+ctx.label+': '+br(v)+' ('+pct+'%)';
        }}}
      }
    }
  });
}

if(sessionStorage.getItem(SK)==='1'){
  document.getElementById('senha-overlay').classList.add('hidden');
  document.getElementById('conteudo').style.display='block';
  inicializar();
} else {
  const _cp=sessionStorage.getItem('_xpa');
  if(_cp){
    sessionStorage.removeItem('_xpa');
    (async()=>{
      const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(_cp));
      const hex=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
      if(hex===HASH){sessionStorage.setItem(SK,'1');document.getElementById('senha-overlay').classList.add('hidden');document.getElementById('conteudo').style.display='block';inicializar();}
      else{document.getElementById('senha-input').focus();}
    })();
  }
}
</script>
