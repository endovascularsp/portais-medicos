<style>
/* fix-mobile-overflow-v7 */
html,body{overflow-x:hidden!important;max-width:100vw;}
@media(max-width:600px){
  body{padding:0!important;margin:0!important;}
  /* === Header (apenas .header classe) === */
  .header{
    flex-wrap:wrap!important;height:auto!important;min-height:0!important;
    padding-left:14px!important;padding-right:14px!important;
    gap:8px!important;
  }
  .header > .header-logo{flex:1 1 auto!important;min-width:0;}
  .header > .header-actions{
    flex:0 0 100%!important;justify-content:flex-end!important;
    gap:6px!important;margin-top:4px;
  }
  .header > .header-actions .header-action-btn{padding:5px 10px!important;font-size:11px!important;}
  /* === Imagens dentro de qualquer header-logo (resolve Hub: img base64 sem class .logo-svg) === */
  .header-logo img{width:44px!important;height:44px!important;flex-shrink:0!important;}
  /* === Login boxes === */
  .login-card,.login-box,.senha-box,.login-input-wrap{
    width:auto!important;max-width:calc(100vw - 24px)!important;
  }
  /* === Padding lateral === */
  .admin-nav,.portais-nav,.admin-portais-nav,.main,.hub-body{
    padding-left:14px!important;padding-right:14px!important;
    box-sizing:border-box;
  }
  /* === Periodo-bloco === */
  .periodo-bloco{flex-direction:column!important;align-items:stretch!important;gap:10px!important;
    box-sizing:border-box;max-width:100%;}
  .periodo-bloco .f-grp{flex-wrap:wrap!important;width:100%;}
  .periodo-bloco .range-sep{display:none!important;}
  .range-filter{flex-wrap:wrap!important;gap:6px!important;width:100%;}
  .range-filter select{flex:1 1 calc(50% - 3px)!important;min-width:0!important;}
  .range-filter .range-ate{flex:0 0 100%!important;text-align:center;}
  .range-btn{flex:1 1 calc(50% - 3px)!important;}
  .prof-select{flex:1 1 100%!important;min-width:0!important;max-width:100%!important;width:100%;}
  .tabs-flex,.periodo-tabs{flex-wrap:wrap!important;}
  /* === Nav portais: scroll horizontal interno === */
  .portais-nav,.admin-nav,.admin-portais-nav{
    flex-wrap:nowrap!important;overflow-x:auto!important;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;
  }
  .portais-nav::-webkit-scrollbar,.admin-nav::-webkit-scrollbar,.admin-portais-nav::-webkit-scrollbar{display:none;}
  .portais-nav-btn,.admin-nav-btn,.admin-portais-nav-btn{flex-shrink:0!important;}
  /* === KPIs: 2 colunas === */
  .kpi-row,.cards,.metrics-grid,.insights-grid{
    grid-template-columns:repeat(2,minmax(0,1fr))!important;
    gap:8px!important;width:100%;max-width:100%;
  }
  /* === Cards de gráfico: 1 coluna em mobile === */
  .two-col,.three-col,.grid-2,.grid-main,.grid-pag{
    grid-template-columns:1fr!important;
    gap:14px!important;
  }
  .kpi,.metric-card,.card,.card-box,.chart-card,.full-col,.insight-card,.hub-card{
    max-width:100%!important;
    box-sizing:border-box!important;
  }
  .kpi{padding:14px 14px 14px 12px!important;}
  .kpi-ic{top:10px!important;right:10px!important;width:26px!important;height:26px!important;font-size:12px!important;}
  .kpi-label{font-size:10px!important;letter-spacing:0.3px!important;}
  .kpi-val{font-size:16px!important;word-break:break-word;line-height:1.2;}
  .kpi-foot{font-size:10px!important;}
  .metric-valor{font-size:18px!important;word-break:break-word;}
  /* Hub cards: 1 coluna */
  .hub-cards{grid-template-columns:1fr!important;gap:14px!important;}
  /* === Chart-wrap: SEM overflow:hidden, altura maior pra legibilidade === */
  .chart-wrap{max-width:100%!important;height:300px!important;}
  canvas{max-width:100%!important;}
  /* === Tabelas: scroll === */
  .table-scroll,.table-wrap,#bottom-detail{overflow-x:auto!important;-webkit-overflow-scrolling:touch;max-width:100%;}
  /* === Chips Produtividade === */
  .destaques{flex-wrap:wrap!important;gap:6px!important;max-width:100%;}
  .chip{font-size:10px!important;padding:5px 7px!important;}
  /* === Imagens (mas NÃO header-logo img que tem regra propria acima) === */
  img:not(.header-logo img){max-width:100%!important;height:auto;}
}
@media(max-width:380px){
  .kpi-row,.cards,.metrics-grid,.insights-grid{
    grid-template-columns:1fr!important;
  }
}

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // Gate de permissão: cards 'gestor' OU 'gestor_produtividade' entram.
  (async function() {
    const _isLocalPreview = location.protocol === 'file:'
      || location.hostname === 'localhost'
      || location.hostname === '127.0.0.1';
    if (_isLocalPreview) {
      console.log('[produtividade] preview local — gate Supabase ignorado');
      document.documentElement.style.visibility = 'visible';
      return;
    }
    try {
      const sb = window.supabase.createClient(
        'https://egpcrqrvctnpxbdjdhtf.supabase.co',
        'sb_publishable_3XwZlcCc_bb7eyy5UAIkxg_BY61mwsW'
      );
      // Usa getSession() (lê localStorage, instantâneo) em vez de getUser() (vai no servidor)
        const { data: { session } } = await sb.auth.getSession();
        if (!session) { window.location.replace('/login/'); return; }
        const user = session.user;
        const email = (user.email || '').toLowerCase();
        // Cache de cards em sessionStorage (30 min). Evita query no Supabase a cada navegação.
        const _cacheKey = '_cards_' + email;
        const _cacheT   = '_cards_t_' + email;
        let cards = null;
        try {
          const stored = sessionStorage.getItem(_cacheKey);
          const storedT = parseInt(sessionStorage.getItem(_cacheT) || '0', 10);
          if (stored && (Date.now() - storedT) < 30 * 60 * 1000) {
            cards = JSON.parse(stored);
          }
        } catch (e) {}
        if (!cards) {
          const { data: me } = await sb.from('users')
            .select('cards')
            .eq('email', email)
            .maybeSingle();
          cards = (me && me.cards) || [];
          try {
            sessionStorage.setItem(_cacheKey, JSON.stringify(cards));
            sessionStorage.setItem(_cacheT, String(Date.now()));
          } catch (e) {}
        }
      const podeVer = cards.includes('gestor') || cards.includes('gestor_produtividade');
      if (!podeVer) { window.location.replace('/hub/Gestor_Hub.html'); return; }
      document.documentElement.style.visibility = 'visible';
    } catch (e) {
      console.error('gate erro:', e);
      window.location.replace('/login/');
    }
  })();
</script>

<style>
:root{
  --navy:#0B1F3A;--azul:#1A5296;--azul-md:#2E6DA4;--azul-cl:#D6E8F7;
  --bg:#0B1F3A;--cinza-cl:#F7FAFD;--borda:#C4D4E8;--borda-fr:#A8C1DE;
  --texto:#0D1E30;--texto2:#4A6278;--gold:#A18960;--verde:#2D7A3C;
  --sombra:0 2px 14px rgba(11,31,58,0.08);--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--texto);overflow-x:hidden;}
html{overflow-x:hidden;}

.senha-overlay{position:fixed;inset:0;background:linear-gradient(160deg,#0B1F3A,#0d2d55 60%,#0B1F3A);
  display:flex;align-items:center;justify-content:center;z-index:9999;}
.senha-overlay.hidden{display:none;}
.senha-box{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);
  border-radius:20px;padding:48px 40px;width:340px;text-align:center;backdrop-filter:blur(12px);}
.senha-box h2{color:#fff;font-size:20px;margin-bottom:6px;}
.senha-box p{color:rgba(255,255,255,0.5);font-size:13px;margin-bottom:24px;}
.senha-input{width:100%;padding:13px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.08);color:#fff;font-size:15px;text-align:center;
  letter-spacing:3px;outline:none;}
.senha-btn{width:100%;margin-top:12px;padding:13px;border-radius:10px;
  background:linear-gradient(135deg,#1A5296,#0B1F3A);border:none;color:#fff;
  font-size:15px;font-weight:700;cursor:pointer;}
.senha-erro{color:#ff7070;font-size:13px;margin-top:8px;min-height:18px;}

.header{background:var(--navy);color:#fff;padding:0 32px;min-height:68px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--azul);box-shadow:0 2px 20px rgba(11,31,58,0.25);}
.header-logo{display:flex;align-items:center;gap:16px;}
.header-logo .logo-svg{width:44px;height:44px;flex-shrink:0;}
.header-logo h1{font-size:18px;font-weight:700;letter-spacing:0.3px;color:#fff;}
.header-logo span{font-size:11.5px;opacity:0.70;display:block;margin-top:2px;letter-spacing:0.2px;color:#fff;}
.header-left h1{color:var(--navy);font-size:18px;font-weight:800;}
.header-left p{color:var(--texto2);font-size:12px;margin-top:2px;}
.header-tag{background:var(--azul);color:#fff;font-size:10px;font-weight:700;
  letter-spacing:1px;padding:4px 12px;border-radius:20px;text-transform:uppercase;}

.admin-nav{background:var(--navy);border-bottom:1px solid rgba(255,255,255,0.08);
  padding:10px 32px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.admin-nav-label{color:rgba(255,255,255,0.55);font-size:11px;font-weight:700;
  letter-spacing:0.6px;text-transform:uppercase;}
.admin-nav-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;
  border-radius:20px;font-size:12px;font-weight:600;text-decoration:none;
  border:1.5px solid;transition:all 0.15s;background:#fff;}
.admin-nav-btn.endo{color:var(--azul);border-color:var(--borda-fr);}
.admin-nav-btn.endo:hover{background:var(--azul);color:#fff;border-color:var(--azul);}
.admin-nav-btn.hub{color:#94a3b8;border-color:rgba(148,163,184,0.35);background:rgba(148,163,184,0.08);}
.admin-nav-btn.hub:hover{background:rgba(148,163,184,0.20);border-color:#94a3b8;}
.admin-nav-btn.prod-oxy{color:#6dd5a0;border-color:rgba(109,213,160,0.35);background:rgba(109,213,160,0.08);}
.admin-nav-btn.prod-oxy:hover{background:rgba(109,213,160,0.20);border-color:#6dd5a0;}
.admin-nav-btn.active{opacity:0.85;cursor:default;pointer-events:none;font-weight:700;}
.admin-nav-btn.prod{color:#fff;border-color:var(--azul);background:var(--azul);opacity:0.85;cursor:default;pointer-events:none;}

.main{padding:28px 48px;margin:0;}

.periodo-bloco{display:flex;align-items:center;gap:10px;margin-bottom:22px;flex-wrap:wrap;
  background:#fff;padding:14px 18px;border-radius:12px;border:1px solid var(--borda);
  box-shadow:var(--sombra);}
.periodo-label{font-size:10px;font-weight:700;color:var(--texto2);
  letter-spacing:0.4px;text-transform:uppercase;}
.periodo-tabs{display:flex;gap:8px;flex-wrap:wrap;}
.f-grp{display:flex;align-items:center;gap:6px;}
.tab{padding:5px 12px;border-radius:20px;border:1.5px solid var(--borda);background:#fff;
  font-size:12px;font-weight:600;cursor:pointer;color:var(--texto2);transition:all 0.15s;}
.tab.active{background:var(--navy);border-color:var(--navy);color:#fff;}
.tab:hover:not(.active){border-color:var(--azul);color:var(--azul);}
.tab.desativa{opacity:0.45;}
.range-sep{width:1px;height:30px;background:var(--borda);}
.range-filter{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.range-filter select{padding:4px 8px;border-radius:8px;border:1.5px solid var(--borda);
  background:#fff;font-size:12px;color:var(--texto);font-weight:600;cursor:pointer;}
.range-filter select:focus{border-color:var(--azul);outline:none;}
.range-ate{font-size:12px;color:var(--texto2);}
.range-btn{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:700;
  cursor:pointer;border:1.5px solid;transition:all 0.15s;}
.range-btn.apply{background:var(--azul);color:#fff;border-color:var(--azul);}
.range-btn.apply:hover{background:var(--navy);border-color:var(--navy);}
.range-btn.clear{background:#fff;color:var(--texto2);border-color:var(--borda);}
.range-btn.clear:hover{background:var(--cinza-cl);}

.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:16px;margin-bottom:22px;}
.kpi{background:linear-gradient(180deg,var(--navy) 0%,#13315b 100%);border-radius:12px;
  padding:18px 56px 18px 20px;box-shadow:var(--sombra);
  border:1px solid var(--navy);border-left:4px solid var(--azul);position:relative;}
.kpi-ic{position:absolute;top:16px;right:16px;width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:17px;
  background:rgba(255,255,255,0.16);}
.kpi-accent .kpi-ic{background:rgba(255,255,255,0.18);}
.kpi.gold{border-left-color:var(--gold);}
.kpi.verde{border-left-color:var(--verde);}
.kpi.navy{border-left-color:var(--navy);}
.kpi-label{font-size:11px;color:rgba(255,255,255,0.70);font-weight:700;letter-spacing:0.5px;
  text-transform:uppercase;margin-bottom:6px;}
.kpi-val{font-size:22px;font-weight:800;color:#fff;}
.destaques{display:flex;flex-wrap:wrap;gap:10px;margin:-6px 0 22px;}
.chip{background:#fff;border:1px solid var(--borda);border-radius:20px;
  padding:7px 14px;font-size:12px;color:var(--texto2);box-shadow:var(--sombra);}
.chip b{color:var(--navy);font-weight:800;margin-right:4px;}

.grid-main{display:grid;grid-template-columns:1fr 1.8fr;gap:20px;align-items:stretch;margin-bottom:20px;}
@media(max-width:900px){.grid-main{grid-template-columns:1fr;}}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
@media(max-width:900px){.grid-2{grid-template-columns:1fr;}}
.kpi-foot{font-size:11px;color:rgba(255,255,255,0.85);margin-top:10px;display:flex;
  align-items:center;gap:6px;font-weight:600;}
.delta-pos{color:var(--verde);font-weight:800;}
.delta-neg{color:#C0392B;font-weight:800;}
.kpi-accent{background:linear-gradient(180deg,var(--navy) 0%,#13315b 100%);
  border-color:var(--navy);border-left-color:var(--gold);}
.kpi-accent .kpi-label{color:rgba(255,255,255,0.70);}
.kpi-accent .kpi-val{color:#fff;}
.kpi-accent .kpi-foot{color:rgba(255,255,255,0.85);}
.kpi-accent .delta-pos{color:#7CD992;}
.kpi-accent .delta-neg{color:#F19A8E;}
.share-cell{position:relative;}
.share-bar{position:absolute;right:0;top:50%;transform:translateY(-50%);
  height:62%;background:linear-gradient(90deg,rgba(161,137,96,0.05),rgba(161,137,96,0.32));
  border-radius:4px;z-index:0;}
.share-cell span{position:relative;z-index:1;}
.prof-select{padding:5px 10px;border:1px solid var(--borda);border-radius:8px;
  font-size:12px;font-weight:600;color:var(--navy);background:#fff;cursor:pointer;max-width:210px;}
.rank-card{display:flex;align-items:center;gap:14px;padding:13px 6px;
  border-bottom:1px solid var(--borda);}
.rank-card:last-child{border-bottom:none;}
.rank-pos{font-size:15px;font-weight:800;color:var(--texto2);width:30px;
  text-align:center;flex:none;}
.rank-pos.top{color:var(--gold);}
.rank-body{flex:1;min-width:0;}
.rank-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
.rank-name{font-weight:800;color:var(--navy);font-size:14px;}
.rank-total{font-weight:800;color:var(--navy);font-size:14px;white-space:nowrap;}
.rank-track{height:7px;background:var(--cinza-cl);border-radius:4px;
  margin:7px 0 6px;overflow:hidden;}
.rank-fill{height:100%;background:linear-gradient(90deg,var(--gold),#c7ad82);}
.rank-meta{font-size:11px;color:var(--texto2);display:flex;gap:14px;flex-wrap:wrap;}
.rank-meta a{color:var(--gold);font-weight:700;text-decoration:none;}
.rank-meta a:hover{text-decoration:underline;}
.mes-table{width:100%;border-collapse:collapse;}
.mes-table th,.mes-table td{padding:9px 14px;font-size:13px;text-align:right;}
.mes-table th{background:var(--cinza-cl);color:var(--navy);font-size:11px;

.mes-table .val-cell{font-weight:700;color:var(--navy);}

.heat-table th,.heat-table td{padding:10px 14px;font-size:13px;text-align:right;
  border-bottom:1px solid var(--borda);}
.heat-table th{background:var(--cinza-cl);color:var(--navy);font-size:11px;

.heat-table th:nth-child(2),.heat-table td:nth-child(2){text-align:left;}
.heat-table th:first-child,.heat-table td:first-child{text-align:center;width:30px;

.heat-bar{position:relative;}
.heat-bar i{position:absolute;right:0;top:50%;transform:translateY(-50%);height:60%;

  border-radius:4px;z-index:0;}
.heat-bar b{position:relative;z-index:1;color:var(--navy);}

.pct-badge{display:inline-block;min-width:58px;text-align:center;padding:4px 10px;

.heat-link{color:var(--navy);font-weight:700;text-decoration:none;}
.heat-link:hover{color:var(--gold);text-decoration:underline;}

.chart-card .heat-table td,.chart-card .mes-table td{border-bottom-color:rgba(255,255,255,0.10);color:#e6edf6;}
.chart-card .heat-table td:first-child{color:#9fb2cc;}
.chart-card .heat-bar b{color:#fff;}
.chart-card .heat-link{color:#e6edf6;}
.chart-card .heat-link:hover{color:var(--gold);}
.chart-card .heat-table tr:hover td{filter:brightness(1.10);}
.chart-card .mes-table .val-cell{color:#fff;}
.chart-card .heat-cell{color:#0D1E30;}
.section-title{font-size:13px;font-weight:800;color:var(--navy);margin-bottom:14px;
  letter-spacing:0.3px;text-transform:uppercase;}
.chart-wrap{position:relative;height:280px;}

.table-wrap{background:#fff;border-radius:12px;box-shadow:var(--sombra);
  border:1px solid var(--borda);overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:var(--cinza-cl);color:var(--navy);font-size:11px;font-weight:800;
  letter-spacing:0.4px;text-transform:uppercase;padding:11px 14px;text-align:left;

.empty-row td{text-align:center;padding:40px;color:var(--texto2);}

/* mobile-600-v2 */
@media(max-width:600px){

}

@media(max-width:380px){

}

function pidsDisponiveis(){
  return PORDER.filter(p=>Object.values(DADOS).some(d=>d[p]));
}
function labelOf(pid){
  return Object.values(DADOS).find(d=>d[pid])?.[pid]?.label || pid;
}

function inicializar(){
  const pids = pidsDisponiveis();
  const tabs = document.getElementById('periodo-tabs');
  tabs.innerHTML = '';
  pids.forEach((pid,i)=>{
    const t = document.createElement('button');
    t.className = 'tab' + (i===pids.length-1?' active':'');
    t.textContent = labelOf(pid);
    t.dataset.pid = pid;
    t.onclick = ()=>selecionarMes(pid);
    tabs.appendChild(t);
  });
  const deSel = document.getElementById('range-de');
  const ateSel = document.getElementById('range-ate');
  deSel.innerHTML = ''; ateSel.innerHTML = '';
  pids.forEach(pid=>{
    const lbl = labelOf(pid);
    deSel.insertAdjacentHTML('beforeend', `<option value='${pid}'>${lbl}</option>`);
    ateSel.insertAdjacentHTML('beforeend', `<option value='${pid}'>${lbl}</option>`);
  });
  const pfSel = document.getElementById('prof-filtro');
  pfSel.innerHTML = `<option value=''>Todos os profissionais</option>` +
    Object.keys(DADOS).sort((a,b)=>a.localeCompare(b,'pt'))
      .map(p=>`<option value="${p.replace(/"/g,'&quot;')}">${p}</option>`).join('');
  if(pids.length){
    deSel.value = pids[0];
    ateSel.value = pids[pids.length-1];
    filtroAtual = {tipo:'mes', pid:pids[pids.length-1]};
    render();
  }
}

function selecionarMes(pid){
  filtroAtual = {tipo:'mes', pid};
  document.querySelectorAll('.tab').forEach(t=>{
    t.classList.toggle('active', t.dataset.pid===pid);
    t.classList.remove('desativa');
  });
  render();
}

function aplicarRange(){
  const de = document.getElementById('range-de').value;
  const ate = document.getElementById('range-ate').value;
  const pids = pidsDisponiveis();
  const iDe = pids.indexOf(de), iAte = pids.indexOf(ate);
  if(iDe<0 || iAte<0 || iDe>iAte){ alert('Intervalo inválido. Verifique os meses selecionados.'); return; }
  const selPids = pids.slice(iDe, iAte+1);
  filtroAtual = {tipo:'range', pids:selPids};
  document.querySelectorAll('.tab').forEach(t=>{
    t.classList.remove('active');
    t.classList.add('desativa');
  });
  render();
}

function limparRange(){
  const pids = pidsDisponiveis();
  selecionarMes(pids[pids.length-1]);
}

function agregar(pids){
  const rows = [];
  let totalGlobal=0, atendGlobal=0, pacGlobal=0;
  const pagGlobal = {};
  Object.entries(DADOS).forEach(([prof, periodos])=>{
    let ptotal=0, patend=0, ppac=0;
    pids.forEach(pid=>{
      const r = periodos[pid];
      if(!r) return;
      ptotal += r.total;
      patend += r.n_atend;
      ppac += r.n_pacientes;
      Object.entries(r.por_pagamento).forEach(([tipo, d])=>{
        if(!pagGlobal[tipo]) pagGlobal[tipo] = {valor:0, qtd:0};
        pagGlobal[tipo].valor += d.valor;
        pagGlobal[tipo].qtd += d.qtd;
      });
    });
    if(ptotal>0 || patend>0){
      rows.push({prof, total:ptotal, n_atend:patend, n_pacientes:ppac});
      totalGlobal += ptotal;
      atendGlobal += patend;
      pacGlobal += ppac;
    }
  });
  rows.sort((a,b)=>b.total-a.total);
  return {rows, totalGlobal, atendGlobal, pacGlobal, pagGlobal};
}

function deltaFoot(cur, prev, prevLabel){
  if(prev>0){
    const d=(cur-prev)/prev*100;
    const cls=d>=0?'delta-pos':'delta-neg', arr=d>=0?'▲':'▼';
    return `<div class='kpi-foot'><span class='${cls}'>${arr} ${Math.abs(d).toFixed(1)}%</span> vs ${prevLabel}</div>`;
  }
  return `<div class='kpi-foot'>sem base no mês anterior</div>`;
}

function profAgg(pf, pids){
  let total=0,n_atend=0,n_pacientes=0; const por_pagamento={};
  const per = DADOS[pf]||{};
  pids.forEach(pid=>{
    const r=per[pid]; if(!r) return;
    total+=r.total; n_atend+=r.n_atend; n_pacientes+=r.n_pacientes;
    Object.entries(r.por_pagamento||{}).forEach(([t,d])=>{
      if(!por_pagamento[t]) por_pagamento[t]={valor:0,qtd:0};
      por_pagamento[t].valor+=d.valor; por_pagamento[t].qtd+=d.qtd;
    });
  });
  return {total,n_atend,n_pacientes,por_pagamento};
}

  const share=totalGlobal>0?(r.total/totalGlobal*100):0;
  const med=['①','②','③'][i]||(i+1);
  return `<div class='rank-card'>
    <div class='rank-pos${i<3?' top':''}'>${med}</div>
    <div class='rank-body'>
      <div class='rank-head'><span class='rank-name'>${r.prof}</span><span class='rank-total'>${br(r.total)}</span></div>
      <div class='rank-track'><div class='rank-fill' style='width:${share.toFixed(1)}%'></div></div>
      <div class='rank-meta'><span>${r.n_atend} atend.</span><span>${r.n_pacientes} pac.</span><span>TM ${br(tm)}</span><span>${share.toFixed(1)}% do total</span><a href='${slug}_Produtividade.html'>Abrir portal →</a></div>
    </div>
  </div>`;
}

function tabelaMesAMes(pf){
  const ordem=pidsDisponiveis();
  const tots=ordem.map(pid=>{ const r=(DADOS[pf]||{})[pid]; return r?r.total:0; });
  const max=Math.max(1, ...tots);
  let prev=null; const linhas=[];
  ordem.forEach((pid,i)=>{
    const r=(DADOS[pf]||{})[pid]; const tot=tots[i];
    let dlt='—';
    if(prev!==null && prev>0){
      const d=(tot-prev)/prev*100, cls=d>=0?'delta-pos':'delta-neg', a=d>=0?'▲':'▼';
      dlt=`<span class='${cls}'>${a} ${Math.abs(d).toFixed(1)}%</span>`;
    }
    linhas.push(`<tr><td>${labelOf(pid)}</td>
      <td class='heat-cell' style='background:${corHeat(tot/max)}'>${br(tot)}</td>
      <td>${r?r.n_atend:0}</td><td>${r?r.n_pacientes:0}</td><td>${dlt}</td></tr>`);
    prev=tot;
  });
  return `<table class='mes-table'><thead><tr><th>Mês</th><th>Total</th>
    <th>Atend.</th><th>Pac.</th><th>vs mês ant.</th></tr></thead>
    <tbody>${linhas.join('')}</tbody></table>`;
}

function renderProf(pf, pids, ag){
  const a=profAgg(pf,pids);
  const ticket=a.n_pacientes>0?a.total/a.n_pacientes:0;
  let footTotal=`<div class='kpi-foot'>intervalo de ${pids.length} meses</div>`;
  if(filtroAtual.tipo==='mes'){
    const ordem=pidsDisponiveis(), idx=ordem.indexOf(filtroAtual.pid);
    if(idx>0){ const prev=ordem[idx-1];
      footTotal=deltaFoot(a.total, profAgg(pf,[prev]).total, labelOf(prev));
    } else footTotal=`<div class='kpi-foot'>primeiro mês da série</div>`;
  }
  const part = ag.totalGlobal>0 ? (a.total/ag.totalGlobal*100) : 0;
  const pos = ag.rows.findIndex(r=>r.prof===pf)+1;
  document.getElementById('kpi-row').innerHTML=`
    <div class='kpi kpi-accent'><div class='kpi-ic'>💰</div><div class='kpi-label'>Total — ${pf}</div><div class='kpi-val'>${br(a.total)}</div>${footTotal}</div>
    <div class='kpi gold'><div class='kpi-ic'>🎟️</div><div class='kpi-label'>Ticket Médio</div><div class='kpi-val'>${br(ticket)}</div><div class='kpi-foot'>por paciente</div></div>
    <div class='kpi navy'><div class='kpi-ic'>🎯</div><div class='kpi-label'>Participação</div><div class='kpi-val'>${part.toFixed(1)}%</div><div class='kpi-foot'>do total da clínica</div></div>
    <div class='kpi verde'><div class='kpi-ic'>📋</div><div class='kpi-label'>Atendimentos</div><div class='kpi-val'>${a.n_atend}</div><div class='kpi-foot'>${a.n_pacientes} pacientes</div></div>
    <div class='kpi'><div class='kpi-ic'>🏅</div><div class='kpi-label'>Posição no Ranking</div><div class='kpi-val'>${pos||'—'}º</div><div class='kpi-foot'>de ${ag.rows.length} ativos</div></div>`;
  document.getElementById('kpi-row-2').innerHTML = kpiRow2Prof(pf, a);
  document.getElementById('bottom-title').innerHTML=`📆 ${pf} — Mês a mês`;
  document.getElementById('bottom-detail').innerHTML=tabelaMesAMes(pf);
  renderChartPagamento(a.por_pagamento);
  renderChartRanking(ag.rows, pf);
  renderChartEvolucao(pf);
}

function mixParticular(pag){
  let conv=0, tot=0;
  Object.entries(pag||{}).forEach(([t,d])=>{ tot+=d.valor; if(/conv/i.test(t)) conv+=d.valor; });
  if(tot<=0) return {part:0, conv:0};
  return {part:(tot-conv)/tot*100, conv:conv/tot*100};
}

function melhorMes(prof){
  const ordem=pidsDisponiveis(); let best=null;
  ordem.forEach(pid=>{
    const v = prof ? ((DADOS[prof]&&DADOS[prof][pid])?DADOS[prof][pid].total:0)
                    : agregar([pid]).totalGlobal;
    if(best===null || v>best.v) best={v, pid};
  });
  return best;
}

function crescCard(cur, getPrev){
  if(filtroAtual.tipo!=='mes')
    return `<div class='kpi-val'>—</div><div class='kpi-foot'>selecione 1 mês</div>`;
  const ordem=pidsDisponiveis(), idx=ordem.indexOf(filtroAtual.pid);
  if(idx<=0) return `<div class='kpi-val'>—</div><div class='kpi-foot'>primeiro mês</div>`;
  const prev=getPrev(ordem[idx-1]);
  if(!(prev>0)) return `<div class='kpi-val'>—</div><div class='kpi-foot'>sem base anterior</div>`;
  const p=(cur-prev)/prev*100, cls=p>=0?'delta-pos':'delta-neg', ar=p>=0?'▲':'▼';
  return `<div class='kpi-val'><span class='${cls}'>${ar} ${Math.abs(p).toFixed(1)}%</span></div><div class='kpi-foot'>vs ${labelOf(ordem[idx-1])}</div>`;
}

function kpiRow2Todos(ag){
  const {rows, totalGlobal, atendGlobal, pagGlobal} = ag;
  const tkAt = atendGlobal>0 ? totalGlobal/atendGlobal : 0;
  const cresc = crescTxt(totalGlobal, prev=>agregar([prev]).totalGlobal);
  const bm = melhorMes(null);
  const conc = totalGlobal>0 ? rows.slice(0,3).reduce((s,r)=>s+r.total,0)/totalGlobal*100 : 0;
  const lider = rows[0];
  const mix = mixParticular(pagGlobal);
  return `
    <span class='chip'><b>Ticket/atend.</b> ${br(tkAt)}</span>
    <span class='chip'><b>Crescimento</b> ${cresc}</span>
    <span class='chip'><b>Melhor mês</b> ${bm?labelOf(bm.pid)+' · '+br(bm.v):'—'}</span>
    <span class='chip'><b>Concentração Top 3</b> ${conc.toFixed(0)}%</span>
    <span class='chip'><b>Líder</b> ${lider?lider.prof+' ('+br(lider.total)+')':'—'}</span>
    <span class='chip'><b>Mix</b> ${mix.part.toFixed(0)}% part · ${mix.conv.toFixed(0)}% conv</span>`;
}

function kpiRow2Prof(pf, a){
  const tkAt = a.n_atend>0 ? a.total/a.n_atend : 0;
  const cresc = crescTxt(a.total, prev=>profAgg(pf,[prev]).total);
  const bm = melhorMes(pf);
  const mix = mixParticular(a.por_pagamento);
  const recor = a.n_pacientes>0 ? a.n_atend/a.n_pacientes : 0;
  return `
    <span class='chip'><b>Ticket/atend.</b> ${br(tkAt)}</span>
    <span class='chip'><b>Crescimento</b> ${cresc}</span>
    <span class='chip'><b>Melhor mês</b> ${bm?labelOf(bm.pid)+' · '+br(bm.v):'—'}</span>
    <span class='chip'><b>Mix</b> ${mix.part.toFixed(0)}% part · ${mix.conv.toFixed(0)}% conv</span>
    <span class='chip'><b>Recorrência</b> ${recor.toFixed(1)} atend./pac.</span>`;
}

function crescTxt(cur, getPrev){
  if(filtroAtual.tipo!=='mes') return '—';
  const ordem=pidsDisponiveis(), idx=ordem.indexOf(filtroAtual.pid);
  if(idx<=0) return '—';
  const prev=getPrev(ordem[idx-1]);
  if(!(prev>0)) return '—';
  const p=(cur-prev)/prev*100, cls=p>=0?'delta-pos':'delta-neg', ar=p>=0?'▲':'▼';
  return `<span class='${cls}'>${ar} ${Math.abs(p).toFixed(1)}%</span> vs ${labelOf(ordem[idx-1])}`;
}

function corHeat(frac){
  const h = Math.max(0, Math.min(1, frac)) * 130; // 0=vermelho → 130=verde
  return `hsl(${h.toFixed(0)},62%,80%)`;
}

function tabelaHeatTodos(rows, totalGlobal){
  if(!rows.length) return `<div style='padding:24px;color:var(--texto2);text-align:center'>Nenhum dado para o período selecionado.</div>`;
  const max = rows[0].total || 1;
  const linhas = rows.map((r,i)=>{
    const slug=r.prof.replace(/[^A-Za-z0-9À-ÿ]/g,'_').replace(/^_+|_+$/g,'');
    const tm=r.n_pacientes>0?r.total/r.n_pacientes:0;
    const share=totalGlobal>0?(r.total/totalGlobal*100):0;
    const frac=r.total/max;
    return `<tr>
      <td>${i+1}</td>
      <td><a class='heat-link' href='${slug}_Produtividade.html'>${r.prof}</a></td>
      <td class='heat-bar'><i style='width:${(frac*100).toFixed(1)}%'></i><b>${br(r.total)}</b></td>
      <td><span class='pct-badge' style='background:${corHeat(frac)}'>${share.toFixed(1)}%</span></td>
      <td>${r.n_atend}</td>
      <td>${r.n_pacientes}</td>
      <td>${br(tm)}</td>
    </tr>`;
  }).join('');
  return `<table class='heat-table'><thead><tr>
    <th>#</th><th>Profissional</th><th>Total</th><th>% do total</th>
    <th>Atend.</th><th>Pac.</th><th>Ticket</th></tr></thead>
    <tbody>${linhas}</tbody></table>`;
}

// === Lista de pacientes (detalhe paciente-a-paciente, respeita os filtros) ===
let _pacLast = [];
function _norm(s){return (s||'').toString().normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase();}
function _pidsSel(){return filtroAtual.tipo==='mes' ? [filtroAtual.pid] : filtroAtual.pids;}

function badgePag(tipo){
  const cls={'Cartão de crédito':'cc','Cartão de débito':'deb','Transferência bancária':'ted','PIX':'pix','Dinheiro':'din','Convênio':'conv'};
  const ic={'Cartão de crédito':'💳','Cartão de débito':'💳','Transferência bancária':'🏦','PIX':'⚡','Dinheiro':'💵','Convênio':'🏥'};
  const c=cls[tipo]||'outro', i=ic[tipo]||'💰';
  return `<span class="badge-pag ${c}">${i} ${tipo||'—'}</span>`;
}

function coletarAtendimentos(pids, pf){
  const linhas = []; let semDetalhe = 0;
  const nomes = pf ? [pf] : Object.keys(DADOS);
  nomes.forEach(nome=>{
    const per = DADOS[nome] || {};
    (pids||[]).forEach(pid=>{
      const r = per[pid];
      if(!r) return;
      if(Array.isArray(r.atendimentos)){
        r.atendimentos.forEach(a=>{
          linhas.push({
            prof:nome, data:a.data||'', data_iso:a.data_iso||'',
            paciente:a.paciente||'',
            procArr:(a.procedimentos||[]),
            pagamento:a.pagamento||'', parcelas:a.parcelas||1, valor:a.valor||0
          });
        });
      } else if(r.n_atend>0){ semDetalhe += r.n_atend; }
    });
  });
  return {linhas, semDetalhe};
}

function renderPacientes(){
  const det = document.getElementById('pac-detail');
  if(!det) return;
  const pids = _pidsSel();
  const pfSel = document.getElementById('prof-filtro');
  const pf = pfSel && pfSel.value ? pfSel.value : null;
  const buscaEl = document.getElementById('pac-busca');
  const termo = _norm(buscaEl ? buscaEl.value : '');
  let {linhas, semDetalhe} = coletarAtendimentos(pids, pf);
  if(termo) linhas = linhas.filter(l=>_norm(l.paciente).includes(termo));
  linhas.sort((a,b)=>(b.data_iso||'').localeCompare(a.data_iso||'') || a.prof.localeCompare(b.prof,'pt'));
  _pacLast = linhas;

  const nPac = new Set(linhas.map(l=>_norm(l.paciente))).size;
  const cnt = document.getElementById('pac-count');
  if(cnt){
    cnt.textContent = `${linhas.length} registro${linhas.length!==1?'s':''} · ${nPac} paciente${nPac!==1?'s':''}`;
  }

  const avisoSem = semDetalhe
    ? `<div class='pac-empty' style='font-size:12px;text-align:left;padding:12px 4px 0'>⚠ ${semDetalhe} atendimento(s) de profissional(is) sem portal individual não aparecem nesta lista.</div>`
    : '';

  if(!linhas.length){
    det.innerHTML = `<div class='pac-empty'>Nenhum paciente ${termo?'encontrado para a busca':'no período selecionado'}.</div>${avisoSem}`;
    return;
  }
  const showProf = !pf;
  const head = `<tr>${showProf?'<th>Profissional</th>':''}<th>Data</th><th>Paciente</th><th>Pagamento</th><th style='text-align:right'>Valor</th></tr>`;
  const body = linhas.map(l=>{
    const procs = l.procArr.map(p=>`<div class="proc-item">• ${p.nome}${p.qtd>1?' ('+p.qtd+')':''}</div>`).join('');
    const parc  = l.parcelas>1?`<div class="parc-badge">📅 ${l.parcelas}x</div>`:'';
    return `<tr>${showProf?`<td class='pac-prof'>${l.prof}</td>`:''}<td style="white-space:nowrap;color:var(--texto2)">${l.data}</td><td><div class="paciente-nome">${l.paciente}</div><div class="proc-list">${procs}</div></td><td>${badgePag(l.pagamento)}${parc}</td><td class="valor-cell">${br(l.valor)}</td></tr>`;
  }).join('');
  det.innerHTML = `<table><thead>${head}</thead><tbody>${body}</tbody></table>${avisoSem}`;
}

function exportarPacientesCSV(){
  if(!_pacLast.length){ alert('Nada para exportar no período/filtro atual.'); return; }
  const head = ['Profissional','Data','Paciente','Procedimentos','Pagamento','Parcelas','Valor'];
  const esc = v => '"'+String(v).replace(/"/g,'""')+'"';
  const procStr = l => l.procArr.map(p=>p.qtd>1?`${p.nome} (${p.qtd})`:p.nome).join(' | ');
  const linhas = _pacLast.map(l=>[l.prof,l.data,l.paciente,procStr(l),l.pagamento,l.parcelas,l.valor.toFixed(2).replace('.',',')].map(esc).join(';'));
  const csv = '﻿'+head.map(esc).join(';')+'\n'+linhas.join('\n');
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'pacientes_produtividade.csv'; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}

function render(){
  renderPacientes();
  const pids = filtroAtual.tipo==='mes' ? [filtroAtual.pid] : filtroAtual.pids;
  const ag = agregar(pids);
  const pfSel = document.getElementById('prof-filtro');
  const pf = pfSel && pfSel.value ? pfSel.value : null;
  if(pf && DADOS[pf]){ renderProf(pf, pids, ag); return; }

  const {rows, totalGlobal, atendGlobal, pacGlobal, pagGlobal} = ag;
  const ticketMedio = pacGlobal>0 ? totalGlobal/pacGlobal : 0;
  let footTotal = `<div class='kpi-foot'>período selecionado</div>`;
  if(filtroAtual.tipo==='mes'){
    const ordem = pidsDisponiveis();
    const idx = ordem.indexOf(filtroAtual.pid);
    if(idx>0){
      footTotal = deltaFoot(totalGlobal, agregar([ordem[idx-1]]).totalGlobal, labelOf(ordem[idx-1]));
    } else { footTotal = `<div class='kpi-foot'>primeiro mês da série</div>`; }
  } else {
    footTotal = `<div class='kpi-foot'>intervalo de ${pids.length} meses</div>`;
  }
  const apPac = (atendGlobal && pacGlobal) ? (atendGlobal/pacGlobal).toFixed(1) : '0';

  document.getElementById('kpi-row').innerHTML = `
    <div class='kpi kpi-accent'><div class='kpi-ic'>💰</div><div class='kpi-label'>Total Produzido</div><div class='kpi-val'>${br(totalGlobal)}</div>${footTotal}</div>
    <div class='kpi gold'><div class='kpi-ic'>🎟️</div><div class='kpi-label'>Ticket Médio</div><div class='kpi-val'>${br(ticketMedio)}</div><div class='kpi-foot'>por paciente</div></div>
    <div class='kpi navy'><div class='kpi-ic'>👨‍⚕️</div><div class='kpi-label'>Profissionais Ativos</div><div class='kpi-val'>${rows.length}</div><div class='kpi-foot'>com produção no período</div></div>
    <div class='kpi verde'><div class='kpi-ic'>📋</div><div class='kpi-label'>Atendimentos</div><div class='kpi-val'>${atendGlobal}</div><div class='kpi-foot'>${apPac} atend./paciente</div></div>
    <div class='kpi'><div class='kpi-ic'>👥</div><div class='kpi-label'>Pacientes</div><div class='kpi-val'>${pacGlobal}</div><div class='kpi-foot'>únicos no período</div></div>`;

  document.getElementById('kpi-row-2').innerHTML = kpiRow2Todos(ag);

  document.getElementById('bottom-title').innerHTML = '👥 Produção por Profissional';
  document.getElementById('bottom-detail').innerHTML = tabelaHeatTodos(rows, totalGlobal);

  renderChartPagamento(pagGlobal);
  renderChartRanking(rows, null);
  renderChartEvolucao(null);
}

function renderChartRanking(rows, highlight){
  const ctx = document.getElementById('chart-ranking');
  if(chartRanking) chartRanking.destroy();
  if(!rows.length){
    const c=ctx.getContext('2d'); c.clearRect(0,0,ctx.width,ctx.height);
    c.font='13px Segoe UI'; c.fillStyle='#9FB2CC'; c.textAlign='center';
    c.fillText('Sem dados no período', ctx.width/2, ctx.height/2); return;
  }
  const top = rows.slice(0,12);
  const labels = top.map(r=>r.prof);
  const vals = top.map(r=>r.total);
  const cores = top.map((r,i)=> highlight ? (r.prof===highlight ? '#E8C26A' : '#6E93C2') : (i===0 ? '#E8C26A' : '#6E93C2'));
  chartRanking = new Chart(ctx,{
    type:'bar',
    data:{labels, datasets:[{data:vals, backgroundColor:cores, borderRadius:5, maxBarThickness:26}]},
    options:{
      indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false},
        tooltip:{callbacks:{label:c=>' '+br(c.parsed.x)}}},
      scales:{
        x:{ticks:{callback:v=>br(v), font:{size:10}, color:'#A9BBD4'}, grid:{color:'rgba(255,255,255,0.10)'}},
        y:{ticks:{font:{size:11,weight:'600'}, color:'#E6EDF6'}, grid:{display:false}}
      }
    }
  });
}

function renderChartEvolucao(prof){
  const ctx = document.getElementById('chart-evol');
  if(chartEvol) chartEvol.destroy();
  const ordem = pidsDisponiveis();
  const labels = ordem.map(labelOf);
  const vals = ordem.map(pid=> prof ? ((DADOS[prof]&&DADOS[prof][pid])?DADOS[prof][pid].total:0) : agregar([pid]).totalGlobal);
  const selPid = filtroAtual.tipo==='mes' ? filtroAtual.pid : null;
  const pr = ordem.map(pid=> pid===selPid ? 6 : 3);
  chartEvol = new Chart(ctx,{
    type:'line',
    data:{labels, datasets:[{
      data:vals, borderColor:'#E8C26A', borderWidth:2,
      backgroundColor:'rgba(232,194,106,0.18)', fill:true, tension:0.3,
      pointBackgroundColor:'#E8C26A', pointBorderColor:'#fff',
      pointRadius:pr, pointHoverRadius:7
    }]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false},
        tooltip:{callbacks:{label:c=>' '+br(c.parsed.y)}}},
      scales:{
        y:{beginAtZero:true, ticks:{callback:v=>br(v), font:{size:10}, color:'#A9BBD4'},
           grid:{color:'rgba(255,255,255,0.10)'}},
        x:{ticks:{font:{size:11,weight:'600'}, color:'#E6EDF6'}, grid:{display:false}}
      }
    }
  });
}

function renderChartPagamento(pagGlobal){
  const entries = Object.entries(pagGlobal).sort((a,b)=>b[1].valor-a[1].valor);
  const labels = entries.map(([t])=>t);
  const vals = entries.map(([,d])=>d.valor);
  const coresPag = {
    'Cartão de crédito':'#E07B28',
    'Cartão de débito':'#2980B9',
    'Transferência bancária':'#2D7A3C',
    'Dinheiro':'#8E44AD',
    'Convênio':'#C0392B',
    'PIX':'#16A085'
  };
  const bg = labels.map(l=>coresPag[l]||'#7f8c8d');
  const ctx = document.getElementById('chart-pag');
  if(chartPag) chartPag.destroy();
  if(!labels.length){
    const c = ctx.getContext('2d');
    c.clearRect(0,0,ctx.width,ctx.height);
    c.font='13px Segoe UI'; c.fillStyle='#9FB2CC'; c.textAlign='center';
    c.fillText('Sem dados de pagamento', ctx.width/2, ctx.height/2);
    return;
  }
  chartPag = new Chart(ctx, {
    type:'bar',
    data:{labels, datasets:[{data:vals, backgroundColor:bg, borderRadius:5, maxBarThickness:30}]},
    options:{
      indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false},
        tooltip:{callbacks:{label:c=>{
          const tot=c.dataset.data.reduce((a,b)=>a+b,0);
          const v=c.parsed.x, pct=tot>0?((v/tot)*100).toFixed(1):'0';
          return ' '+br(v)+' ('+pct+'%)';
        }}}},
      scales:{
        x:{ticks:{callback:v=>br(v), font:{size:10}, color:'#A9BBD4'}, grid:{color:'rgba(255,255,255,0.10)'}},
        y:{ticks:{font:{size:11,weight:'600'}, color:'#E6EDF6'}, grid:{display:false}}
      }
    }
  });
}

<script>

// Funciona em producao HTTP. Em file:// local nao roda (silencioso).
(function(){
  if (location.protocol === 'file:') return;
  const seletores = '.portais-nav a[href], .admin-nav a[href], .admin-portais-nav a[href]';
  const links = document.querySelectorAll(seletores);
  links.forEach(async (a) => {
    if (!a.href || a.classList.contains('active') || a.getAttribute('href') === '#') return;
    try {
      const r = await fetch(a.href, {method:'HEAD'});
      if (!r.ok) a.style.display = 'none';
    } catch (e) { /* network err: deixa visivel */ }
  });
})();
</script>

<!-- UX5-TIMESTAMP -->
<script>
// UX #5: mostra 'Dados de DD/MM/AAAA' baseado na ultima atualizacao do arquivo
(function(){
  try {
    const dt = new Date(document.lastModified);
    if (isNaN(dt.getTime())) return;
    const fmt = dt.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit', year:'numeric'});
    const tag = document.createElement('div');
    tag.className = 'ts-rodape';
    tag.innerHTML = '<style>.ts-rodape{text-align:center;font-size:11px;color:rgba(255,255,255,0.45);padding:14px;letter-spacing:0.3px;}@media(max-width:600px){.ts-rodape{padding:10px;font-size:10px;}}</style>📅 Dados atualizados em <strong style="color:rgba(255,255,255,0.75);">' + fmt + '</strong> · Endovascular SP © 2026';
    document.body.appendChild(tag);
  } catch(e){}
})();
</script>

</body>
</html>
