<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Produtividade Oxy Recovery</title>
<style>
:root{
  --navy:#0a2218;--azul:#1a7a4a;--cinza:#F2F7F5;--borda:#C8DDD5;
  --texto:#0D1E14;--texto2:#3A6050;--gold:#A18960;--verde:#2D7A3C;
  --sombra:0 2px 14px rgba(11,31,58,0.12);--radius:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--cinza);color:var(--texto);}
.senha-overlay{position:fixed;inset:0;background:linear-gradient(160deg,#0a2218,#0d3d26 60%,#0a2218);
  display:flex;align-items:center;justify-content:center;z-index:9999;}
.senha-overlay.hidden{display:none;}
.senha-box{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);
  border-radius:20px;padding:48px 40px;width:340px;text-align:center;backdrop-filter:blur(12px);}
.senha-box h2{color:#fff;font-size:20px;margin-bottom:6px;}
.senha-box p{color:rgba(255,255,255,0.5);font-size:13px;margin-bottom:24px;}
.senha-input{width:100%;padding:13px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.08);color:#fff;font-size:15px;text-align:center;
  letter-spacing:3px;outline:none;}
.senha-btn{width:100%;margin-top:12px;padding:13px;border-radius:10px;
  background:linear-gradient(135deg,#1a7a4a,#0a2218);border:none;color:#fff;
  font-size:15px;font-weight:700;cursor:pointer;}
.senha-erro{color:#ff7070;font-size:13px;margin-top:8px;min-height:18px;}
.header{background:var(--navy);padding:0 32px;min-height:64px;display:flex;
  align-items:center;justify-content:space-between;}
.header-left h1{color:#fff;font-size:18px;font-weight:700;}
.header-left p{color:rgba(255,255,255,0.5);font-size:12px;}
.header-tag{background:rgba(245,166,35,0.2);border:1px solid rgba(245,166,35,0.5);
  color:#f5c842;font-size:10px;font-weight:700;letter-spacing:1px;padding:3px 10px;
  border-radius:20px;text-transform:uppercase;}
.admin-nav{background:#162d50;border-bottom:1px solid rgba(255,255,255,0.08);
  padding:8px 32px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.admin-nav-label{color:rgba(255,255,255,0.45);font-size:11px;font-weight:600;
  letter-spacing:0.6px;text-transform:uppercase;}
.admin-nav-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;
  border-radius:20px;font-size:12px;font-weight:600;text-decoration:none;border:1.5px solid;transition:all 0.15s;}
.admin-nav-btn.endo{color:#7eb8f7;border-color:rgba(126,184,247,0.35);background:rgba(126,184,247,0.06);}
.admin-nav-btn.endo:hover{background:rgba(126,184,247,0.18);border-color:#7eb8f7;}
.admin-nav-btn.hub{color:#94a3b8;border-color:rgba(148,163,184,0.35);background:rgba(148,163,184,0.08);}
.admin-nav-btn.hub:hover{background:rgba(148,163,184,0.20);border-color:#94a3b8;}
.admin-nav-btn.prod{color:#c084fc;border-color:rgba(192,132,252,0.35);background:rgba(192,132,252,0.08);}
.admin-nav-btn.prod:hover{background:rgba(192,132,252,0.20);border-color:#c084fc;}
.admin-nav-btn.oxy{color:#6dd5a0;border-color:rgba(109,213,160,0.35);background:rgba(109,213,160,0.06);}
.admin-nav-btn.oxy:hover{background:rgba(109,213,160,0.18);border-color:#6dd5a0;}
.admin-nav-btn.active{opacity:0.4;cursor:default;pointer-events:none;}
.main{padding:28px 32px;max-width:1400px;margin:0 auto;}
.periodo-tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
.tab{padding:8px 20px;border-radius:20px;border:1.5px solid var(--borda);background:#fff;
  font-size:13px;font-weight:600;cursor:pointer;color:var(--texto2);transition:all 0.15s;}
.tab.active{background:var(--azul);border-color:var(--azul);color:#fff;}
.tab:hover:not(.active){border-color:var(--azul);color:var(--azul);}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px;}
.kpi{background:#fff;border-radius:var(--radius);padding:18px 20px;box-shadow:var(--sombra);
  border:1px solid var(--borda);border-top:3px solid var(--azul);}
.kpi.gold{border-top-color:var(--gold);}
.kpi-label{font-size:11px;color:var(--texto2);font-weight:600;letter-spacing:0.5px;
  text-transform:uppercase;margin-bottom:6px;}
.kpi-val{font-size:20px;font-weight:800;}
.table-wrap{background:#fff;border-radius:var(--radius);box-shadow:var(--sombra);
  border:1px solid var(--borda);overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:var(--cinza);color:var(--texto2);font-size:11px;font-weight:700;
  letter-spacing:0.4px;text-transform:uppercase;padding:10px 14px;text-align:left;
  border-bottom:2px solid var(--borda);}
td{padding:12px 14px;border-bottom:1px solid #eef2f8;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f8fbff;}
.prof-link{color:var(--azul);text-decoration:none;font-weight:600;}
.prof-link:hover{text-decoration:underline;}
.val-cell{font-weight:700;text-align:right;white-space:nowrap;}
</style>
</head>
<body>
<div class='senha-overlay' id='senha-overlay'>
  <div class='senha-box'>
    <h2>💊 Gestor — Produtividade</h2>
    <p>Oxy Recovery</p>
    <input class='senha-input' id='senha-input' type='password' placeholder='Senha de acesso'/>
    <button class='senha-btn' onclick='verificarSenha()'>Entrar</button>
    <div class='senha-erro' id='senha-erro'></div>
  </div>
</div>

<div id='conteudo' style='display:none'>
<header class='header'>
  <div class='header-left'>
    <h1>📊 Dashboard de Produtividade</h1>
    <p>Endovascular SP — Visão Gestores</p>
  </div>
  <div class='header-tag'>Admin</div>
</header>
<nav class='admin-nav'>
  <span class='admin-nav-label'>Portal:</span>
  <a href='../hub/Gestor_Hub.html' class='admin-nav-btn hub'>🏠 Hub</a>
  <a href='../produtividade/' class='admin-nav-btn prod'>🏥 Endovascular SP</a>
  <a href='#' class='admin-nav-btn oxy active'>💊 Oxy Recovery</a>
</nav>
<div class='main'>
  <div class='periodo-tabs' id='periodo-tabs'></div>
  <div class='kpi-row' id='kpi-row'></div>
  <div class='table-wrap'>
    <table>
      <thead>
        <tr>
          <th>Profissional</th>
          <th style='text-align:right'>Total Produzido</th>
          <th style='text-align:right'>Pacientes</th>
          <th style='text-align:right'>Atendimentos</th>
          <th>Crt. Crédito</th>
          <th>Transferência</th>
          <th>Portal</th>
        </tr>
      </thead>
      <tbody id='tbody'></tbody>
    </table>
  </div>
</div>
</div>

<script>
const DADOS   = {"Mateus Antunes Nogueira": {"2026-01": {"label": "Janeiro/2026", "total": 3350.0, "n_atend": 4, "n_pacientes": 2, "por_pagamento": {"Cartão de crédito": {"valor": 2150.0, "qtd": 3}, "PIX": {"valor": 1200.0, "qtd": 1}}}, "2026-02": {"label": "Fevereiro/2026", "total": 2400.0, "n_atend": 1, "n_pacientes": 1, "por_pagamento": {"Cartão de crédito": {"valor": 2400.0, "qtd": 1}}}, "2026-03": {"label": "Março/2026", "total": 8600.0, "n_atend": 6, "n_pacientes": 6, "por_pagamento": {"Dinheiro": {"valor": 950.0, "qtd": 1}, "Cartão de crédito": {"valor": 7650.0, "qtd": 5}}}}, "Christiane Sayuri Lopes Inoue": {"2026-01": {"label": "Janeiro/2026", "total": 79020.0, "n_atend": 18, "n_pacientes": 16, "por_pagamento": {"Cartão de crédito": {"valor": 76520.0, "qtd": 15}, "Cartão de débito": {"valor": 2500.0, "qtd": 3}}}, "2026-02": {"label": "Fevereiro/2026", "total": 60040.0, "n_atend": 16, "n_pacientes": 13, "por_pagamento": {"Cartão de crédito": {"valor": 49590.0, "qtd": 12}, "Cartão de débito": {"valor": 2350.0, "qtd": 3}, "PIX": {"valor": 8100.0, "qtd": 1}}}, "2026-03": {"label": "Março/2026", "total": 127865.01, "n_atend": 39, "n_pacientes": 30, "por_pagamento": {"Cartão de crédito": {"valor": 101950.01, "qtd": 32}, "PIX": {"valor": 17735.0, "qtd": 4}, "Cartão de débito": {"valor": 3190.0, "qtd": 2}, "Dinheiro": {"valor": 4990.0, "qtd": 1}}}}, "Juliana Olimpio de Paula": {"2026-02": {"label": "Fevereiro/2026", "total": 25000.0, "n_atend": 6, "n_pacientes": 4, "por_pagamento": {"Cartão de crédito": {"valor": 7500.0, "qtd": 2}, "Cartão de débito": {"valor": 3000.0, "qtd": 1}, "PIX": {"valor": 13900.0, "qtd": 2}, "Dinheiro": {"valor": 600.0, "qtd": 1}}}, "2026-03": {"label": "Março/2026", "total": 89232.0, "n_atend": 11, "n_pacientes": 11, "por_pagamento": {"Dinheiro": {"valor": 2612.0, "qtd": 1}, "Cartão de crédito": {"valor": 40620.0, "qtd": 5}, "PIX": {"valor": 46000.0, "qtd": 5}}}, "2026-01": {"label": "Janeiro/2026", "total": 32800.0, "n_atend": 6, "n_pacientes": 6, "por_pagamento": {"PIX": {"valor": 15000.0, "qtd": 1}, "Cartão de crédito": {"valor": 14300.0, "qtd": 4}, "Dinheiro": {"valor": 3500.0, "qtd": 1}}}}, "Maria Fernanda R Fernandes": {"2026-02": {"label": "Fevereiro/2026", "total": 1400.0, "n_atend": 4, "n_pacientes": 4, "por_pagamento": {"PIX": {"valor": 300.0, "qtd": 1}, "Cartão de crédito": {"valor": 1100.0, "qtd": 3}}}, "2026-03": {"label": "Março/2026", "total": 1000.0, "n_atend": 3, "n_pacientes": 2, "por_pagamento": {"PIX": {"valor": 1000.0, "qtd": 3}}}, "2026-01": {"label": "Janeiro/2026", "total": 2000.0, "n_atend": 7, "n_pacientes": 4, "por_pagamento": {"Cartão de débito": {"valor": 700.0, "qtd": 3}, "Cartão de crédito": {"valor": 800.0, "qtd": 3}, "PIX": {"valor": 500.0, "qtd": 1}}}}, "Augusto Ferreira de Carvalho Caparica": {"2026-02": {"label": "Fevereiro/2026", "total": 900.0, "n_atend": 1, "n_pacientes": 1, "por_pagamento": {"Cartão de crédito": {"valor": 900.0, "qtd": 1}}}}, "Simone Matsuda Torricelli": {"2026-03": {"label": "Março/2026", "total": 2280.0, "n_atend": 1, "n_pacientes": 1, "por_pagamento": {"PIX": {"valor": 2280.0, "qtd": 1}}}, "2026-01": {"label": "Janeiro/2026", "total": 1780.0, "n_atend": 2, "n_pacientes": 2, "por_pagamento": {"Cartão de crédito": {"valor": 690.0, "qtd": 1}, "Cartão de débito": {"valor": 1090.0, "qtd": 1}}}}, "Julia do Valle Bargieri": {"2026-03": {"label": "Março/2026", "total": 1820.0, "n_atend": 3, "n_pacientes": 3, "por_pagamento": {"Cartão de crédito": {"valor": 1280.0, "qtd": 2}, "Cartão de débito": {"valor": 540.0, "qtd": 1}}}}, "Igor Rafael Sincos": {"2026-03": {"label": "Março/2026", "total": 40400.0, "n_atend": 4, "n_pacientes": 4, "por_pagamento": {"Dinheiro": {"valor": 2500.0, "qtd": 1}, "PIX": {"valor": 34500.0, "qtd": 2}, "Cartão de crédito": {"valor": 3400.0, "qtd": 1}}}, "2026-01": {"label": "Janeiro/2026", "total": 1250.0, "n_atend": 2, "n_pacientes": 2, "por_pagamento": {"Cartão de crédito": {"valor": 1250.0, "qtd": 2}}}, "2026-02": {"label": "Fevereiro/2026", "total": 4750.0, "n_atend": 3, "n_pacientes": 1, "por_pagamento": {"Cartão de crédito": {"valor": 3702.7, "qtd": 2}, "PIX": {"valor": 1047.3, "qtd": 1}}}}, "Fernanda Liporaci Villela Zuchi": {"2026-02": {"label": "Fevereiro/2026", "total": 2400.0, "n_atend": 1, "n_pacientes": 1, "por_pagamento": {"Cartão de crédito": {"valor": 2400.0, "qtd": 1}}}}};
const PORDER  = ["2026-01", "2026-02", "2026-03"];
const HASH    = '123cd8b4a5b4b2076e11633ff7e6813548f356d4b77780fad532b28e42f1f735';
const SK      = 'prod_oxy_admin_auth';

function br(v){return 'R\u00a0'+v.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');}

async function verificarSenha(){
  const val = document.getElementById('senha-input').value;
  if(!val){document.getElementById('senha-erro').textContent='Digite a senha.';return;}
  const buf = await crypto.subtle.digest('SHA-256',new TextEncoder().encode(val));
  const hex = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  if(hex===HASH){
    sessionStorage.setItem(SK,'1');
    sessionStorage.setItem('_xpa',val);
    document.getElementById('senha-overlay').classList.add('hidden');
    document.getElementById('conteudo').style.display='block';
    inicializar();
  }else{
    document.getElementById('senha-erro').textContent='Senha incorreta.';
    document.getElementById('senha-input').value='';
    document.getElementById('senha-input').focus();
  }
}
document.getElementById('senha-input').addEventListener('keydown',e=>{if(e.key==='Enter')verificarSenha();});

function inicializar(){
  const pids = PORDER.filter(p=>Object.values(DADOS).some(d=>d[p]));
  const tabs = document.getElementById('periodo-tabs');
  pids.forEach((pid,i)=>{
    const lbl = Object.values(DADOS).find(d=>d[pid])?.[ pid]?.label || pid;
    const t = document.createElement('button');
    t.className='tab'+(i===pids.length-1?' active':'');
    t.textContent = lbl;
    t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
                    t.classList.add('active');renderPeriodo(pid);};
    tabs.appendChild(t);
  });
  if(pids.length) renderPeriodo(pids[pids.length-1]);
}

function renderPeriodo(pid){
  let totGlobal=0,patGlobal=new Set(),atGlobal=0;
  const rows=[];
  Object.entries(DADOS).forEach(([prof,periodos])=>{
    if(!periodos[pid]) return;
    const r=periodos[pid];
    totGlobal+=r.total; atGlobal+=r.n_atend;
    const cc=(r.por_pagamento['Cartão de crédito']?.valor||0);
    const ted=(r.por_pagamento['Transferência bancária']?.valor||0);
    rows.push({prof,r,cc,ted});
  });
  rows.sort((a,b)=>b.r.total-a.r.total);

  document.getElementById('kpi-row').innerHTML=`
    <div class="kpi gold"><div class="kpi-label">Total Produzido</div><div class="kpi-val">${br(totGlobal)}</div></div>
    <div class="kpi"><div class="kpi-label">Profissionais Ativos</div><div class="kpi-val">${rows.length}</div></div>
    <div class="kpi"><div class="kpi-label">Total Atendimentos</div><div class="kpi-val">${atGlobal}</div></div>`;

  const tbody=document.getElementById('tbody');
  tbody.innerHTML='';
  rows.forEach(({prof,r,cc,ted})=>{
    const slugged = prof.replace(/[^A-Za-z0-9\u00C0-\u00FF]/g,'_').replace(/^_+|_+$/g,'');
    tbody.innerHTML+=`<tr>
      <td><strong>${prof}</strong></td>
      <td class="val-cell">${br(r.total)}</td>
      <td style="text-align:right">${r.n_pacientes}</td>
      <td style="text-align:right">${r.n_atend}</td>
      <td style="color:#e65100;font-weight:600">${cc>0?br(cc):'—'}</td>
      <td style="color:#2e7d32;font-weight:600">${ted>0?br(ted):'—'}</td>
      <td><a href="${slugged}_Produtividade.html" class="prof-link">Abrir →</a></td>
    </tr>`;
  });
}

if(sessionStorage.getItem(SK)==='1'){
  document.getElementById('senha-overlay').classList.add('hidden');
  document.getElementById('conteudo').style.display='block';
  inicializar();
} else {
  const _cp=sessionStorage.getItem('_xpa');
  if(_cp){
    sessionStorage.removeItem('_xpa');
    (async()=>{
      const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(_cp));
      const hex=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
      if(hex===HASH){sessionStorage.setItem(SK,'1');document.getElementById('senha-overlay').classList.add('hidden');document.getElementById('conteudo').style.display='block';inicializar();}
      else{document.getElementById('senha-input').focus();}
    })();
  }
}
</script>
</body>
</html>
