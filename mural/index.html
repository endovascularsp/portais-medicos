<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" href="../assets/logo.png" type="image/png" />
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Mural de Avisos — Endovascular SP</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{overflow-x:hidden;max-width:100vw}
    body{font-family:'Segoe UI',Arial,sans-serif;background:#0d1b2e;min-height:100vh;color:#fff}

    /* ===== Login ===== */
    #login-overlay{
      position:fixed;inset:0;background:linear-gradient(135deg,#0d1b2e 0%,#162d50 100%);
      display:flex;align-items:center;justify-content:center;z-index:1000;
    }
    .login-box{
      background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
      border-radius:16px;padding:40px 36px;width:100%;max-width:380px;text-align:center;
      backdrop-filter:blur(10px);margin:0 12px;
    }
    .login-logo{font-size:40px;margin-bottom:8px}
    .login-title{font-size:19px;font-weight:700;margin-bottom:4px}
    .login-sub{font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:22px}
    .login-btn{
      width:100%;padding:13px;border-radius:10px;border:none;
      background:linear-gradient(135deg,#c98a1e,#f5a623);color:#1a1206;
      font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s;
    }
    .login-btn:hover{opacity:.9}
    .login-erro{color:#ff7b7b;font-size:13px;margin-top:12px;min-height:18px;line-height:1.5}

    /* ===== App ===== */
    #main{display:none;min-height:100vh;background:linear-gradient(135deg,#0d1b2e 0%,#162d50 100%)}
    header{
      background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.08);
      padding:18px 32px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    }
    .header-logo{font-size:30px;flex-shrink:0}
    .header-info h1{font-size:16px;font-weight:700}
    .header-info p{font-size:12px;color:rgba(255,255,255,0.45);margin-top:2px}
    .header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
    .header-badge{padding:4px 14px;border-radius:20px;
      background:rgba(245,166,35,0.15);border:1px solid rgba(245,166,35,0.45);
      color:#f5c842;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
    .btn-voltar{color:rgba(255,255,255,0.6);font-size:13px;text-decoration:none;padding:6px 12px;
      border-radius:8px;border:1px solid rgba(255,255,255,0.12)}
    .btn-voltar:hover{background:rgba(255,255,255,0.06)}

    .wrap{max-width:820px;margin:0 auto;padding:40px 20px 70px}
    .titulo-linha{display:flex;align-items:center;gap:12px;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap}
    .h-mural{font-size:26px;font-weight:700}
    .h-mural span{color:#f5c842}
    .sub-mural{font-size:14px;color:rgba(255,255,255,0.5);margin-bottom:26px}

    .btn-novo{
      padding:11px 20px;border-radius:11px;border:none;cursor:pointer;
      background:linear-gradient(135deg,#c98a1e,#f5a623);color:#1a1206;
      font-size:14px;font-weight:700;transition:opacity .2s;white-space:nowrap;
    }
    .btn-novo:hover{opacity:.9}

    /* ===== Filtro por equipe ===== */
    .filtros{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
    .chip{
      padding:7px 14px;border-radius:20px;font-size:12.5px;font-weight:600;cursor:pointer;
      background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.14);
      color:rgba(255,255,255,0.7);transition:all .15s;
    }
    .chip:hover{background:rgba(255,255,255,0.1)}
    .chip.ativo{background:rgba(245,166,35,0.18);border-color:rgba(245,166,35,0.55);color:#f5c842}

    /* ===== Avisos ===== */
    .aviso{
      background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.10);
      border-radius:16px;padding:22px 24px;margin-bottom:16px;transition:border-color .2s;
    }
    .aviso:hover{border-color:rgba(255,255,255,0.2)}
    .aviso.fixado{border-color:rgba(245,166,35,0.45);background:rgba(245,166,35,0.06)}
    .aviso-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
    .aviso-titulo{font-size:18px;font-weight:700;flex:1;line-height:1.35}
    .pin-flag{color:#f5c842;font-size:14px;flex-shrink:0;margin-top:2px}
    .aviso-corpo{font-size:14.5px;color:rgba(255,255,255,0.82);line-height:1.65;white-space:pre-wrap;word-break:break-word;margin-bottom:14px}
    .aviso-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
    .badge-eq{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;
      background:rgba(126,184,247,0.14);border:1px solid rgba(126,184,247,0.35);color:#a9cdf7}
    .badge-eq.todos{background:rgba(245,166,35,0.16);border-color:rgba(245,166,35,0.45);color:#f5c842}
    .aviso-foot{display:flex;align-items:center;gap:10px;flex-wrap:wrap;
      font-size:12px;color:rgba(255,255,255,0.4);border-top:1px solid rgba(255,255,255,0.07);padding-top:12px}
    .aviso-autor{font-weight:600;color:rgba(255,255,255,0.6)}
    .aviso-acoes{margin-left:auto;display:flex;gap:8px}
    .acao-btn{background:none;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.55);
      font-size:11.5px;padding:5px 11px;border-radius:8px;cursor:pointer;transition:all .15s}
    .acao-btn:hover{background:rgba(255,255,255,0.08);color:#fff}
    .acao-btn.del:hover{border-color:rgba(255,123,123,0.5);color:#ff7b7b}
    .acao-btn.pin.on{border-color:rgba(245,166,35,0.5);color:#f5c842}

    /* Reações */
    .reacoes-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
    .reacao{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:20px;
      padding:4px 11px;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;line-height:1}
    .reacao:hover{background:rgba(255,255,255,0.1)}
    .reacao.ativa{background:rgba(245,166,35,0.16);border-color:rgba(245,166,35,0.5)}
    .reacao .rn{font-size:12px;font-weight:700;color:rgba(255,255,255,0.75)}
    .reacao.ativa .rn{color:#f5c842}

    /* Métricas (comentários / visualizações) */
    .aviso-metrics{display:flex;gap:6px;margin-left:2px}
    .metric-btn{background:none;border:1px solid rgba(255,255,255,0.13);color:rgba(255,255,255,0.5);
      font-size:11.5px;padding:4px 10px;border-radius:8px;cursor:pointer;transition:all .15s}
    .metric-btn:hover{background:rgba(255,255,255,0.08);color:#fff}

    /* Quem viu */
    .viewers-box{margin-top:12px;padding:12px 14px;border-radius:12px;
      background:rgba(126,184,247,0.06);border:1px solid rgba(126,184,247,0.18)}
    .viewers-tit{font-size:12px;font-weight:700;color:#a9cdf7;margin-bottom:8px}
    .viewers-lista{display:flex;flex-wrap:wrap;gap:6px}
    .viewer{font-size:12px;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.75)}
    .viewers-vazio{font-size:12.5px;color:rgba(255,255,255,0.4)}

    /* Comentários */
    .coment-box{margin-top:12px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.08)}
    .coment{margin-bottom:12px}
    .coment-cab{display:flex;align-items:center;gap:8px;margin-bottom:3px}
    .coment-autor{font-size:12.5px;font-weight:700;color:rgba(255,255,255,0.8)}
    .coment-data{font-size:11px;color:rgba(255,255,255,0.35)}
    .coment-del{margin-left:auto;background:none;border:none;color:rgba(255,255,255,0.35);
      font-size:17px;cursor:pointer;line-height:1;padding:0 4px}
    .coment-del:hover{color:#ff7b7b}
    .coment-corpo{font-size:13.5px;color:rgba(255,255,255,0.82);line-height:1.55;white-space:pre-wrap;word-break:break-word}
    .coment-vazio{font-size:12.5px;color:rgba(255,255,255,0.4);margin-bottom:12px}
    .coment-novo{display:flex;gap:8px;margin-top:10px}
    .coment-input{flex:1;padding:9px 12px;border-radius:9px;border:1px solid rgba(255,255,255,0.15);
      background:rgba(255,255,255,0.06);color:#fff;font-size:13.5px;font-family:inherit;outline:none}
    .coment-input:focus{border-color:rgba(245,166,35,0.6)}
    .coment-enviar{padding:9px 16px;border-radius:9px;border:none;background:rgba(245,166,35,0.92);
      color:#1a1206;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
    .coment-enviar:hover{opacity:.9}

    .vazio{text-align:center;color:rgba(255,255,255,0.4);font-size:14px;padding:60px 20px}
    .vazio-ic{font-size:44px;margin-bottom:12px;opacity:.5}

    /* ===== Modal novo aviso ===== */
    #modal{display:none;position:fixed;inset:0;background:rgba(5,10,20,0.72);z-index:1100;
      align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
    #modal.aberto{display:flex}
    .modal-box{
      background:#132540;border:1px solid rgba(255,255,255,0.14);border-radius:18px;
      padding:28px 28px 24px;width:100%;max-width:560px;
    }
    .modal-titulo{font-size:19px;font-weight:700;margin-bottom:20px}
    .campo-label{font-size:12.5px;font-weight:600;color:rgba(255,255,255,0.6);margin-bottom:7px;display:block}
    .inp{width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.15);
      background:rgba(255,255,255,0.06);color:#fff;font-size:14.5px;font-family:inherit;outline:none;
      margin-bottom:18px;transition:border-color .2s}
    .inp:focus{border-color:rgba(245,166,35,0.6)}
    textarea.inp{resize:vertical;min-height:120px;line-height:1.5}
    .equipes-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:22px}
    .eq-check{display:flex;align-items:center;gap:9px;padding:11px 13px;border-radius:10px;cursor:pointer;
      background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);font-size:13.5px;transition:all .15s}
    .eq-check:hover{background:rgba(255,255,255,0.09)}
    .eq-check input{width:16px;height:16px;accent-color:#f5a623;cursor:pointer}
    .eq-check.todos{grid-column:1/-1;background:rgba(245,166,35,0.08);border-color:rgba(245,166,35,0.3)}
    .modal-acoes{display:flex;gap:10px;justify-content:flex-end}
    .btn-cancel{padding:11px 20px;border-radius:10px;background:none;border:1px solid rgba(255,255,255,0.18);
      color:rgba(255,255,255,0.7);font-size:14px;cursor:pointer;font-weight:600}
    .btn-cancel:hover{background:rgba(255,255,255,0.06)}
    .modal-erro{color:#ff7b7b;font-size:13px;margin-bottom:14px;min-height:16px}

    @media(max-width:600px){
      header{padding:14px 16px}
      .wrap{padding:28px 16px 60px}
      .equipes-grid{grid-template-columns:1fr}
      .modal-box{padding:22px 18px}
    }
  </style>
</head>
<body>

  <!-- ===== LOGIN ===== -->
  <div id="login-overlay">
    <div class="login-box">
      <div class="login-logo">📣</div>
      <div class="login-title">Mural de Avisos</div>
      <div class="login-sub">Endovascular SP · acesso restrito</div>
      <button class="login-btn" onclick="entrarComGoogle()">Entrar com Google</button>
      <div class="login-erro" id="login-erro"></div>
    </div>
  </div>

  <!-- ===== APP ===== -->
  <div id="main">
    <header>
      <div class="header-logo">📣</div>
      <div class="header-info">
        <h1>Mural de Avisos</h1>
        <p>Endovascular SP</p>
      </div>
      <div class="header-right">
        <a class="btn-voltar" href="../hub/Gestor_Hub.html">← Hub</a>
        <span class="header-badge">Interno</span>
      </div>
    </header>

    <div class="wrap">
      <div class="titulo-linha">
        <div>
          <div class="h-mural">Olá, <span id="saudacao">time</span> 👋</div>
        </div>
        <button class="btn-novo" onclick="abrirModal()">＋ Novo aviso</button>
      </div>
      <div class="sub-mural">Avisos internos da clínica. Publique e marque as equipes a que se aplica.</div>

      <div class="filtros" id="filtros"></div>

      <div id="feed"></div>
    </div>
  </div>

  <!-- ===== MODAL NOVO AVISO ===== -->
  <div id="modal">
    <div class="modal-box">
      <div class="modal-titulo">📣 Novo aviso</div>
      <div class="modal-erro" id="modal-erro"></div>

      <label class="campo-label">Título</label>
      <input class="inp" id="f-titulo" maxlength="140" placeholder="Ex.: Reunião geral na sexta às 8h"/>

      <label class="campo-label">Mensagem</label>
      <textarea class="inp" id="f-corpo" maxlength="4000" placeholder="Escreva o aviso..."></textarea>

      <label class="campo-label">Para quais equipes?</label>
      <div class="equipes-grid" id="f-equipes"></div>

      <div class="modal-acoes">
        <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
        <button class="btn-novo" id="btn-publicar" onclick="publicar()">Publicar</button>
      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://egpcrqrvctnpxbdjdhtf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_3XwZlcCc_bb7eyy5UAIkxg_BY61mwsW';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Equipes disponíveis (slug -> rótulo). 'todos' é tratado à parte.
const EQUIPES = {
  recepcao:       { label: 'Recepção',       emoji: '🛎️' },
  atendimento:    { label: 'Atendimento',    emoji: '💬' },
  enfermagem:     { label: 'Enfermagem',     emoji: '💉' },
  concierge:      { label: 'Concierge',      emoji: '🎩' },
  administrativo: { label: 'Administrativo', emoji: '🗂️' },
};

let me = null;          // { email, nome, isAdmin }
let avisos = [];        // cache do feed
let reacoes = [], comentarios = [], visualizacoes = [];
let filtroAtivo = 'todas';
const comentAbertos = new Set();   // avisos com comentários expandidos
const viewersAbertos = new Set();  // avisos com "quem viu" expandido
const REACOES = ['👍','❤️','🎉','👏','✅'];

/* ---------- Auth ---------- */
async function entrarComGoogle() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.href.split('#')[0].split('?')[0] }
  });
  if (error) document.getElementById('login-erro').textContent = 'Erro: ' + error.message;
}

function mostrarLogin(msg) {
  document.getElementById('login-overlay').style.display = 'flex';
  document.getElementById('main').style.display = 'none';
  if (msg) document.getElementById('login-erro').innerHTML = msg;
}

async function checkAuth() {
  const { data: { session } } = await sb.auth.getSession();
  const user = session ? session.user : null;
  if (!user) return mostrarLogin();
  const email = (user.email || '').toLowerCase();

  const { data, error } = await sb.from('users')
    .select('email,name,role,cards').eq('email', email).maybeSingle();

  if (error || !data) {
    await sb.auth.signOut();
    return mostrarLogin('Email <strong>' + email + '</strong> não está cadastrado.<br/>Contate um administrador.');
  }
  const cards = data.cards || [];
  // Vê o mural quem tem o card 'mural' ou o guarda-chuva 'gestor'. Médicos não têm nenhum dos dois.
  const podeVer = cards.includes('mural') || cards.includes('gestor');
  if (!podeVer) {
    await sb.auth.signOut();
    return mostrarLogin('Você não tem acesso ao Mural de Avisos.<br/>Contate um administrador.');
  }

  me = { email, nome: data.name || email.split('@')[0], isAdmin: data.role === 'admin' };
  document.getElementById('saudacao').textContent = (me.nome || 'time').split(' ')[0];
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  montarFiltros();
  montarCheckboxesEquipes();
  await carregarFeed();
}

/* ---------- Feed ---------- */
async function carregarFeed() {
  const { data, error } = await sb.from('mural_avisos')
    .select('*')
    .order('fixado', { ascending: false })
    .order('created_at', { ascending: false });
  if (error) {
    document.getElementById('feed').innerHTML =
      '<div class="vazio">Erro ao carregar avisos: ' + esc(error.message) + '</div>';
    return;
  }
  avisos = data || [];
  const ids = avisos.map(a => a.id);
  reacoes = []; comentarios = []; visualizacoes = [];

  if (ids.length) {
    // Registra que EU vi cada aviso (menos os meus). Não sobrescreve visualização antiga.
    const paraRegistrar = avisos
      .filter(a => a.autor_email !== me.email)
      .map(a => ({ aviso_id: a.id, viewer_email: me.email, viewer_nome: me.nome }));
    if (paraRegistrar.length) {
      await sb.from('mural_visualizacoes')
        .upsert(paraRegistrar, { onConflict: 'aviso_id,viewer_email', ignoreDuplicates: true });
    }
    const [rx, cm, vw] = await Promise.all([
      sb.from('mural_reacoes').select('*').in('aviso_id', ids),
      sb.from('mural_comentarios').select('*').in('aviso_id', ids).order('created_at', { ascending: true }),
      sb.from('mural_visualizacoes').select('*').in('aviso_id', ids),  // RLS: só volta linhas dos meus avisos (ou tudo, se admin)
    ]);
    reacoes = rx.data || [];
    comentarios = cm.data || [];
    visualizacoes = vw.data || [];
  }
  renderFeed();
}

function renderFeed() {
  const feed = document.getElementById('feed');
  let lista = avisos;
  if (filtroAtivo !== 'todas') {
    lista = avisos.filter(a => {
      const eqs = a.equipes || [];
      return eqs.includes('todos') || eqs.includes(filtroAtivo);
    });
  }
  if (!lista.length) {
    feed.innerHTML = '<div class="vazio"><div class="vazio-ic">📭</div>' +
      (avisos.length ? 'Nenhum aviso para este filtro.' : 'Nenhum aviso publicado ainda.<br/>Seja o primeiro a publicar!') +
      '</div>';
    return;
  }
  feed.innerHTML = lista.map(cardHtml).join('');
  // Reabre comentários / "quem viu" que estavam expandidos antes do reload
  comentAbertos.forEach(id => { const b = document.getElementById('coments-' + id); if (b) { preencherComentarios(id); b.style.display = 'block'; } });
  viewersAbertos.forEach(id => { const b = document.getElementById('viewers-' + id); if (b) { preencherViewers(id); b.style.display = 'block'; } });
}

function cardHtml(a) {
  const eqs = a.equipes || [];
  let badges;
  if (eqs.includes('todos')) {
    badges = '<span class="badge-eq todos">📢 Todos</span>';
  } else {
    badges = eqs.map(e => EQUIPES[e]
      ? '<span class="badge-eq">' + EQUIPES[e].emoji + ' ' + esc(EQUIPES[e].label) + '</span>'
      : '').join('');
  }
  const souAutor = a.autor_email === me.email;

  // Fixar e Apagar: só admin (autor NÃO apaga mais o próprio post)
  let acoes = '';
  if (me.isAdmin) {
    acoes += '<button class="acao-btn pin ' + (a.fixado ? 'on' : '') + '" onclick="togglePin(\'' + a.id + '\',' + (!a.fixado) + ')">' +
      (a.fixado ? '📌 Fixado' : '📌 Fixar') + '</button>';
    acoes += '<button class="acao-btn del" onclick="apagar(\'' + a.id + '\')">Apagar</button>';
  }

  // Barra de reações
  const rs = reacoes.filter(r => r.aviso_id === a.id);
  const barra = REACOES.map(em => {
    const dessa = rs.filter(r => r.emoji === em);
    const eu = dessa.some(r => r.autor_email === me.email);
    const quem = dessa.map(r => r.autor_nome || r.autor_email).join(', ');
    return '<button class="reacao' + (eu ? ' ativa' : '') + '" title="' + esc(quem) + '" onclick="toggleReacao(\'' + a.id + '\',\'' + em + '\')">' +
      em + (dessa.length ? '<span class="rn">' + dessa.length + '</span>' : '') + '</button>';
  }).join('');

  // Métricas: comentários (todos veem) + visualizações (só autor/admin veem)
  const nComent = comentarios.filter(c => c.aviso_id === a.id).length;
  let metricas = '<button class="metric-btn" onclick="toggleComentarios(\'' + a.id + '\')">💬 ' + nComent + '</button>';
  if (souAutor || me.isAdmin) {
    const nView = visualizacoes.filter(v => v.aviso_id === a.id).length;
    metricas += '<button class="metric-btn" onclick="toggleViewers(\'' + a.id + '\')">👁 ' + nView + '</button>';
  }

  return '<div class="aviso' + (a.fixado ? ' fixado' : '') + '">' +
    '<div class="aviso-top">' +
      (a.fixado ? '<span class="pin-flag">📌</span>' : '') +
      '<div class="aviso-titulo">' + esc(a.titulo) + '</div>' +
    '</div>' +
    '<div class="aviso-badges">' + badges + '</div>' +
    '<div class="aviso-corpo">' + esc(a.corpo) + '</div>' +
    '<div class="reacoes-bar">' + barra + '</div>' +
    '<div class="aviso-foot">' +
      '<span class="aviso-autor">' + esc(a.autor_nome || a.autor_email) + '</span>' +
      '<span>· ' + dataRelativa(a.created_at) + '</span>' +
      '<span class="aviso-metrics">' + metricas + '</span>' +
      (acoes ? '<span class="aviso-acoes">' + acoes + '</span>' : '') +
    '</div>' +
    '<div class="viewers-box" id="viewers-' + a.id + '" style="display:none"></div>' +
    '<div class="coment-box" id="coments-' + a.id + '" style="display:none"></div>' +
  '</div>';
}

/* ---------- Filtros ---------- */
function montarFiltros() {
  const chips = ['<span class="chip ativo" data-f="todas" onclick="setFiltro(this)">Todas</span>'];
  for (const slug in EQUIPES) {
    chips.push('<span class="chip" data-f="' + slug + '" onclick="setFiltro(this)">' +
      EQUIPES[slug].emoji + ' ' + EQUIPES[slug].label + '</span>');
  }
  document.getElementById('filtros').innerHTML = chips.join('');
}
function setFiltro(el) {
  filtroAtivo = el.getAttribute('data-f');
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('ativo', c === el));
  renderFeed();
}

/* ---------- Modal / publicar ---------- */
function montarCheckboxesEquipes() {
  let html = '<label class="eq-check todos"><input type="checkbox" id="eq-todos" onchange="onTodos()"/> 📢 <b>Todos</b> (toda a clínica)</label>';
  for (const slug in EQUIPES) {
    html += '<label class="eq-check"><input type="checkbox" class="eq-item" value="' + slug + '" onchange="onEquipe()"/> ' +
      EQUIPES[slug].emoji + ' ' + EQUIPES[slug].label + '</label>';
  }
  document.getElementById('f-equipes').innerHTML = html;
}
function onTodos() {
  if (document.getElementById('eq-todos').checked) {
    document.querySelectorAll('.eq-item').forEach(i => i.checked = false);
  }
}
function onEquipe() {
  const algum = [...document.querySelectorAll('.eq-item')].some(i => i.checked);
  if (algum) document.getElementById('eq-todos').checked = false;
}

function abrirModal() {
  document.getElementById('f-titulo').value = '';
  document.getElementById('f-corpo').value = '';
  document.getElementById('modal-erro').textContent = '';
  document.querySelectorAll('#f-equipes input').forEach(i => i.checked = false);
  document.getElementById('modal').classList.add('aberto');
}
function fecharModal() { document.getElementById('modal').classList.remove('aberto'); }

async function publicar() {
  const titulo = document.getElementById('f-titulo').value.trim();
  const corpo = document.getElementById('f-corpo').value.trim();
  const erro = document.getElementById('modal-erro');
  erro.textContent = '';

  let equipes;
  if (document.getElementById('eq-todos').checked) {
    equipes = ['todos'];
  } else {
    equipes = [...document.querySelectorAll('.eq-item:checked')].map(i => i.value);
  }

  if (!titulo) return erro.textContent = 'Dê um título ao aviso.';
  if (!corpo) return erro.textContent = 'Escreva a mensagem do aviso.';
  if (!equipes.length) return erro.textContent = 'Selecione ao menos uma equipe (ou "Todos").';

  const btn = document.getElementById('btn-publicar');
  btn.disabled = true; btn.textContent = 'Publicando...';

  const { error } = await sb.from('mural_avisos').insert({
    titulo, corpo, equipes,
    autor_email: me.email,
    autor_nome: me.nome,
  });

  btn.disabled = false; btn.textContent = 'Publicar';
  if (error) return erro.textContent = 'Erro ao publicar: ' + error.message;

  fecharModal();
  await carregarFeed();
}

async function apagar(id) {
  if (!confirm('Apagar este aviso? Esta ação não pode ser desfeita.')) return;
  const { error } = await sb.from('mural_avisos').delete().eq('id', id);
  if (error) return alert('Erro ao apagar: ' + error.message);
  await carregarFeed();
}

async function togglePin(id, fixar) {
  const { error } = await sb.from('mural_avisos').update({ fixado: fixar }).eq('id', id);
  if (error) return alert('Erro: ' + error.message);
  await carregarFeed();
}

/* ---------- Reações ---------- */
async function toggleReacao(avisoId, emoji) {
  const minha = reacoes.find(r => r.aviso_id === avisoId && r.emoji === emoji && r.autor_email === me.email);
  if (minha) {
    const { error } = await sb.from('mural_reacoes').delete().eq('id', minha.id);
    if (error) return alert('Erro: ' + error.message);
  } else {
    const { error } = await sb.from('mural_reacoes')
      .insert({ aviso_id: avisoId, emoji, autor_email: me.email, autor_nome: me.nome });
    if (error) return alert('Erro: ' + error.message);
  }
  await carregarFeed();
}

/* ---------- Comentários ---------- */
function toggleComentarios(avisoId) {
  const box = document.getElementById('coments-' + avisoId);
  if (comentAbertos.has(avisoId)) {
    comentAbertos.delete(avisoId);
    if (box) box.style.display = 'none';
  } else {
    comentAbertos.add(avisoId);
    preencherComentarios(avisoId);
    if (box) box.style.display = 'block';
  }
}
function preencherComentarios(avisoId) {
  const box = document.getElementById('coments-' + avisoId);
  if (!box) return;
  const lista = comentarios.filter(c => c.aviso_id === avisoId);
  const itens = lista.map(c => {
    const podeApagar = c.autor_email === me.email || me.isAdmin;
    return '<div class="coment">' +
      '<div class="coment-cab">' +
        '<span class="coment-autor">' + esc(c.autor_nome || c.autor_email) + '</span>' +
        '<span class="coment-data">' + dataRelativa(c.created_at) + '</span>' +
        (podeApagar ? '<button class="coment-del" title="Apagar" onclick="apagarComentario(\'' + c.id + '\')">×</button>' : '') +
      '</div>' +
      '<div class="coment-corpo">' + esc(c.corpo) + '</div>' +
    '</div>';
  }).join('') || '<div class="coment-vazio">Nenhum comentário ainda. Seja o primeiro.</div>';
  box.innerHTML =
    '<div class="coment-lista">' + itens + '</div>' +
    '<div class="coment-novo">' +
      '<input class="coment-input" id="ci-' + avisoId + '" maxlength="1000" placeholder="Escreva um comentário..." ' +
        'onkeydown="if(event.key===\'Enter\')addComentario(\'' + avisoId + '\')"/>' +
      '<button class="coment-enviar" onclick="addComentario(\'' + avisoId + '\')">Enviar</button>' +
    '</div>';
}
async function addComentario(avisoId) {
  const inp = document.getElementById('ci-' + avisoId);
  if (!inp) return;
  const corpo = inp.value.trim();
  if (!corpo) return;
  inp.disabled = true;
  const { error } = await sb.from('mural_comentarios')
    .insert({ aviso_id: avisoId, corpo, autor_email: me.email, autor_nome: me.nome });
  inp.disabled = false;
  if (error) return alert('Erro ao comentar: ' + error.message);
  comentAbertos.add(avisoId);
  await carregarFeed();
}
async function apagarComentario(id) {
  const { error } = await sb.from('mural_comentarios').delete().eq('id', id);
  if (error) return alert('Erro: ' + error.message);
  await carregarFeed();
}

/* ---------- Quem viu ---------- */
function toggleViewers(avisoId) {
  const box = document.getElementById('viewers-' + avisoId);
  if (viewersAbertos.has(avisoId)) {
    viewersAbertos.delete(avisoId);
    if (box) box.style.display = 'none';
  } else {
    viewersAbertos.add(avisoId);
    preencherViewers(avisoId);
    if (box) box.style.display = 'block';
  }
}
function preencherViewers(avisoId) {
  const box = document.getElementById('viewers-' + avisoId);
  if (!box) return;
  const lista = visualizacoes.filter(v => v.aviso_id === avisoId)
    .sort((a, b) => new Date(b.viewed_at) - new Date(a.viewed_at));
  if (!lista.length) {
    box.innerHTML = '<div class="viewers-tit">👁 Visualizações</div>' +
      '<div class="viewers-vazio">Ninguém visualizou ainda.</div>';
    return;
  }
  box.innerHTML = '<div class="viewers-tit">👁 Visto por ' + lista.length + '</div>' +
    '<div class="viewers-lista">' +
    lista.map(v => '<span class="viewer">' + esc(v.viewer_nome || v.viewer_email) + '</span>').join('') +
    '</div>';
}

/* ---------- Utils ---------- */
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function dataRelativa(iso) {
  const d = new Date(iso), agora = new Date();
  const seg = Math.floor((agora - d) / 1000);
  if (seg < 60) return 'agora';
  if (seg < 3600) return 'há ' + Math.floor(seg / 60) + ' min';
  if (seg < 86400) return 'há ' + Math.floor(seg / 3600) + 'h';
  if (seg < 172800) return 'ontem';
  if (seg < 604800) return 'há ' + Math.floor(seg / 86400) + ' dias';
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

// Fecha modal ao clicar no fundo
document.getElementById('modal').addEventListener('click', e => {
  if (e.target.id === 'modal') fecharModal();
});

sb.auth.onAuthStateChange((event) => {
  if (event === 'SIGNED_IN' || event === 'INITIAL_SESSION' || event === 'TOKEN_REFRESHED') checkAuth();
  else if (event === 'SIGNED_OUT') mostrarLogin();
});
checkAuth();
</script>
