<style>
/* fix-mobile-overflow-v7 */
html,body{overflow-x:hidden!important;max-width:100vw;}
@media(max-width:600px){
  body{padding:0!important;margin:0!important;}
  /* === Header (apenas .header classe) === */
  .header{
    flex-wrap:wrap!important;height:auto!important;min-height:0!important;
    padding-left:14px!important;padding-right:14px!important;
    gap:8px!important;
  }
  .header > .header-logo{flex:1 1 auto!important;min-width:0;}
  .header > .header-actions{
    flex:0 0 100%!important;justify-content:flex-end!important;
    gap:6px!important;margin-top:4px;
  }
  .header > .header-actions .header-action-btn{padding:5px 10px!important;font-size:11px!important;}
  /* === Imagens dentro de qualquer header-logo (resolve Hub: img base64 sem class .logo-svg) === */
  .header-logo img{width:44px!important;height:44px!important;flex-shrink:0!important;}
  /* === Login boxes === */
  .login-card,.login-box,.senha-box,.login-input-wrap{
    width:auto!important;max-width:calc(100vw - 24px)!important;
  }
  /* === Padding lateral === */
  .admin-nav,.portais-nav,.admin-portais-nav,.main,.hub-body{
    padding-left:14px!important;padding-right:14px!important;
    box-sizing:border-box;
  }
  /* === Periodo-bloco === */
  .periodo-bloco{flex-direction:column!important;align-items:stretch!important;gap:10px!important;
    box-sizing:border-box;max-width:100%;}
  .periodo-bloco .f-grp{flex-wrap:wrap!important;width:100%;}
  .periodo-bloco .range-sep{display:none!important;}
  .range-filter{flex-wrap:wrap!important;gap:6px!important;width:100%;}
  .range-filter select{flex:1 1 calc(50% - 3px)!important;min-width:0!important;}
  .range-filter .range-ate{flex:0 0 100%!important;text-align:center;}
  .range-btn{flex:1 1 calc(50% - 3px)!important;}
  .prof-select{flex:1 1 100%!important;min-width:0!important;max-width:100%!important;width:100%;}
  .tabs-flex,.periodo-tabs{flex-wrap:wrap!important;}
  /* === Nav portais: scroll horizontal interno === */
  .portais-nav,.admin-nav,.admin-portais-nav{
    flex-wrap:nowrap!important;overflow-x:auto!important;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;
  }
  .portais-nav::-webkit-scrollbar,.admin-nav::-webkit-scrollbar,.admin-portais-nav::-webkit-scrollbar{display:none;}
  .portais-nav-btn,.admin-nav-btn,.admin-portais-nav-btn{flex-shrink:0!important;}
  /* === KPIs: 2 colunas === */
  .kpi-row,.cards,.metrics-grid,.insights-grid{
    grid-template-columns:repeat(2,minmax(0,1fr))!important;
    gap:8px!important;width:100%;max-width:100%;
  }
  /* === Cards de gráfico: 1 coluna em mobile === */
  .two-col,.three-col,.grid-2,.grid-main,.grid-pag{
    grid-template-columns:1fr!important;
    gap:14px!important;
  }
  .kpi,.metric-card,.card,.card-box,.chart-card,.full-col,.insight-card,.hub-card{
    max-width:100%!important;
    box-sizing:border-box!important;
  }
  .kpi{padding:14px 14px 14px 12px!important;}
  .kpi-ic{top:10px!important;right:10px!important;width:26px!important;height:26px!important;font-size:12px!important;}
  .kpi-label{font-size:10px!important;letter-spacing:0.3px!important;}
  .kpi-val{font-size:16px!important;word-break:break-word;line-height:1.2;}
  .kpi-foot{font-size:10px!important;}
  .metric-valor{font-size:18px!important;word-break:break-word;}
  /* Hub cards: 1 coluna */
  .hub-cards{grid-template-columns:1fr!important;gap:14px!important;}
  /* === Chart-wrap: SEM overflow:hidden, altura maior pra legibilidade === */
  .chart-wrap{max-width:100%!important;height:300px!important;}
  canvas{max-width:100%!important;}
  /* === Tabelas: scroll === */
  .table-scroll,.table-wrap,#bottom-detail{overflow-x:auto!important;-webkit-overflow-scrolling:touch;max-width:100%;}
  /* === Chips Produtividade === */
  .destaques{flex-wrap:wrap!important;gap:6px!important;max-width:100%;}
  .chip{font-size:10px!important;padding:5px 7px!important;}
  /* === Imagens (mas NÃO header-logo img que tem regra propria acima) === */
  img:not(.header-logo img){max-width:100%!important;height:auto;}
}
@media(max-width:380px){
  .kpi-row,.cards,.metrics-grid,.insights-grid{
    grid-template-columns:1fr!important;
  }
}

}

}

  .header-action-btn span{display:none;}
}




  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #0d1b2e 0%, #162d50 100%);
    min-height: 100vh; color: #fff;
    display: flex; align-items: center; justify-content: center;
  }

  .login-box {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 44px 38px;
    width: 100%; max-width: 400px;
    text-align: center;
    backdrop-filter: blur(10px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  .login-logo { font-size: 40px; margin-bottom: 10px; }
  .login-title { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .login-sub { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
  .login-badge {
    display: inline-block;
    margin-bottom: 28px;
    padding: 4px 14px;
    border-radius: 20px;
    background: rgba(245,166,35,0.15);
    border: 1px solid rgba(245,166,35,0.45);
    color: #f5c842;
    font-size: 11px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
  }

  .login-google-btn {
    width: 100%;
    padding: 13px 16px;
    border-radius: 10px;
    border: none;
    background: white;
    color: #1f1f1f;
    font-size: 15px; font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    gap: 12px;
    transition: opacity .2s, transform .15s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .login-google-btn:hover:not(:disabled) { opacity: .92; transform: translateY(-1px); }
  .login-google-btn:disabled { opacity: .55; cursor: not-allowed; }

  .login-erro {
    color: #ff7b7b;
    font-size: 13px;

    font-size: 11px;
    color: rgba(255,255,255,0.25);

<body>

<div class="login-box">
  <div class="login-logo">🔐</div>
  <div class="login-title">Endovascular SP</div>
  <div class="login-sub">Painel de Gestão</div>
  <div class="login-badge">Acesso restrito</div>

  <button id="btn-google" class="login-google-btn">
    <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    <span id="btn-label">Entrar com Google</span>
  </button>

  <div id="login-loading" class="login-loading"></div>
  <div id="login-erro" class="login-erro"></div>

  <div class="login-rodape">Endovascular SP © 2026 · Acesso restrito</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://egpcrqrvctnpxbdjdhtf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_3XwZlcCc_bb7eyy5UAIkxg_BY61mwsW';

// (SSO via cookie compartilhado reservado pra próxima iteração — token Supabase
// estoura 4KB do cookie único. Por enquanto, localStorage default: cada portal
// guarda sessão própria; login vira 1 clique por subdomínio.)
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const $ = (id) => document.getElementById(id);

function setLoading(msg) {
  $('login-loading').textContent = msg || '';
  $('login-erro').textContent = '';
}

function setErro(msg) {
  $('login-loading').textContent = '';
  $('login-erro').innerHTML = msg;
  $('btn-google').disabled = false;
  $('btn-label').textContent = 'Entrar com Google';
}

$('btn-google').addEventListener('click', async () => {
  $('btn-google').disabled = true;
  $('btn-label').textContent = 'Aguarde...';
  setLoading('Redirecionando ao Google...');
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + window.location.pathname }
  });
  if (error) setErro('Erro ao iniciar login: ' + error.message);
});

async function rotear() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) return;

  $('btn-google').disabled = true;
  $('btn-label').textContent = 'Validando...';
  setLoading('Verificando seu acesso...');

  const email = (session.user.email || '').toLowerCase();

  const [usrRes, secRes] = await Promise.all([
    sb.from('users').select('email, name, role, slug, cards').eq('email', email).maybeSingle(),
    sb.from('user_secrets').select('legacy_password').eq('email', email).maybeSingle()
  ]);

  if (usrRes.error || !usrRes.data) {
    setErro('Seu e-mail Google <strong>' + email + '</strong> não está autorizado.<br/>Contate o administrador.');
    await sb.auth.signOut();
    return;
  }

  const user = usrRes.data;
  const cards = user.cards || [];

  if (secRes.data && secRes.data.legacy_password) {
    sessionStorage.setItem('_xpa', secRes.data.legacy_password);
  }
  if (user.name) {
    sessionStorage.setItem('_xname', user.name.split(' ')[0]);
  }

  setLoading('Bem-vindo, ' + (user.name || email) + '. Redirecionando...');

  const baseUrl = window.location.origin + window.location.pathname.replace(/\/login\/?$/, '');

  // Roteamento por cards (mais granular que role):
  // - médico SEM nenhum card de gestão: vai direto pro portal médico individual
  // - todo o resto: vai pro Hub do Gestor, que filtra cards visíveis
  const isMedicoSoProprio = user.role === 'medico'
    && user.slug
    && cards.includes('medico_proprio')
    && !cards.includes('gestor')
    && !cards.includes('atendimentos')
    && !cards.includes('previas');

  if (isMedicoSoProprio) {
    window.location.href = baseUrl + '/hub/' + encodeURIComponent(user.slug) + '_Hub.html';
  } else if (cards.length === 0) {
    setErro('Seu usuário não tem nenhum card permitido. Contate o administrador.');
    await sb.auth.signOut();
  } else {
    // Hub do Gestor filtra cards visíveis automaticamente baseado em users.cards
    window.location.href = baseUrl + '/hub/Gestor_Hub.html';
  }
}

rotear();
</script>
