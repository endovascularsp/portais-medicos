/* === MAIN === */

.header {

}
.header-left h1 {
  font-size: 22px; font-weight: 700;

  background-clip: text;
}
.header-left p { font-size: 12.5px; color: var(--text-2); margin-top: 2px; }
.header-right {

}
.header-greeting { font-size: 13px; color: var(--text-2); }
.header-greeting strong { color: var(--gold-2); }
.btn-home {

  background: rgba(148,163,184,0.15);
  border: 1px solid rgba(148,163,184,0.4);
  color: #94a3b8;
  font-size: 12px; font-weight: 600;
  text-decoration: none;

}
.btn-home:hover { background: rgba(148,163,184,0.25); color: #b9c6d4; }
.last-updated {
  font-size: 11px; color: var(--text-3);
  font-style: italic;
}

/* === TABS === */
.tabs {
  display: flex; gap: 4px;
  margin-bottom: 20px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0;
  flex-wrap: wrap;
}
.tab-btn {
  padding: 10px 18px;
  background: none; border: none;
  color: var(--text-2);
  font-size: 13.5px; font-weight: 600;

}
.tab-btn:hover { color: var(--text); }
.tab-btn.active {

  border-bottom-color: var(--gold);
}
.tab-content { display: none; }
.tab-content.active { display: block; }

/* === STATS BAR (topo de cada aba) === */
.stats {

}
.stat-card {

  border-radius: 10px;
  padding: 12px 18px;

.stat-label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; }
.stat-value { font-size: 22px; font-weight: 700; color: var(--gold-2); margin-top: 4px; }

/* === FILTROS === */
.filtros {

  margin-bottom: 16px;
  flex-wrap: wrap;
}
.filtro-tab {

  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  color: var(--text-2);
  font-size: 12.5px; font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.filtro-tab:hover { background: rgba(255,255,255,0.10); color: var(--text); }
.filtro-tab.active {
  background: rgba(161,137,96,0.20);
  border-color: rgba(161,137,96,0.55);
  color: var(--gold-2);
}

/* === TABELA === */
.tbl-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); background: var(--card); }
table.tbl { width: 100%; border-collapse: collapse; font-size: 13.5px; }
table.tbl th {

  border-bottom: 1px solid var(--border);
  color: var(--gold-2);
  font-weight: 600; font-size: 11.5px;

}
table.tbl td { padding: 11px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); color: var(--text); }
table.tbl tr:hover td { background: rgba(255,255,255,0.03); }
table.tbl tr:last-child td { border-bottom: none; }
.cell-strong { font-weight: 600; color: var(--text); }
.cell-mono { font-family: 'Consolas', 'Monaco', monospace; font-size: 12px; color: var(--text-2); }

.pill-experiencia { background: rgba(245,200,90,0.15); color: #f5c85a; border: 1px solid rgba(245,200,90,0.3); }
.pill-afastado { background: rgba(245,166,35,0.15); color: #f5a623; border: 1px solid rgba(245,166,35,0.3); }
.pill-desligado { background: rgba(148,163,184,0.15); color: #94a3b8; border: 1px solid rgba(148,163,184,0.3); }
.pill-em-aberto { background: rgba(245,200,90,0.15); color: #f5c85a; border: 1px solid rgba(245,200,90,0.3); }
.pill-em-transicao { background: rgba(245,166,35,0.15); color: #f5a623; border: 1px solid rgba(245,166,35,0.3); }
.pill-inativo { background: rgba(148,163,184,0.10); color: var(--text-3); border: 1px solid rgba(148,163,184,0.2); }
.pill-incluso { background: rgba(109,213,160,0.15); color: #6dd5a0; }

.cargo-card-title {

.cargo-card-meta {

}
.cargo-card-resumo {

  line-height: 1.5;

  overflow: hidden;
}

#modal-overlay {

const $ = (id) => document.getElementById(id);

/* === AUTH === */
async function checarSessao() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) return;

  $('btn-google').disabled = true;
  $('btn-label').textContent = 'Validando...';
  $('login-loading').textContent = 'Verificando seu acesso...';

  const email = (session.user.email || '').toLowerCase();
  const { data: userInfo, error } = await sb.from('users')
    .select('email, name, role').eq('email', email).maybeSingle();

  if (error || !userInfo) {
    $('login-erro').innerHTML = 'Seu e-mail Google não está cadastrado.<br/>Contate o administrador.';
    $('login-loading').textContent = '';
    await sb.auth.signOut();
    return;
  }
  if (userInfo.role !== 'admin') {
    $('login-erro').innerHTML = 'Este painel é restrito a administradores.';
    $('login-loading').textContent = '';
    await sb.auth.signOut();
    return;
  }
  entrarApp(userInfo);
}

$('btn-google').addEventListener('click', async () => {
  $('btn-google').disabled = true;
  $('btn-label').textContent = 'Aguarde...';
  $('login-loading').textContent = 'Redirecionando ao Google...';
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + window.location.pathname }
  });
  if (error) {
    $('login-erro').textContent = 'Erro ao iniciar login: ' + error.message;
    $('btn-google').disabled = false;
    $('btn-label').textContent = 'Entrar com Google';
  }
});

function entrarApp(userInfo) {
  const ov = $('login-overlay');
  ov.classList.add('saindo');
  setTimeout(() => { ov.style.display = 'none'; }, 400);
  $('main').style.display = 'block';
  $('greeting-nome').textContent = userInfo.name ? userInfo.name.split(' ')[0] : 'Gestor';
  inicializar();
}

/* === HELPERS === */
function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function fmtBRL(v) {
  if (v === null || v === undefined || v === '') return '—';
  const n = Number(v);
  if (isNaN(n)) return '—';
  return 'R$ ' + n.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}
function fmtDate(d) {
  if (!d) return '—';
  const s = (typeof d === 'object') ? d.start : d;
  if (!s) return '—';
  const [yyyy, mm, dd] = s.split('T')[0].split('-');
  return `${dd}/${mm}/${yyyy}`;
}
function pillStatus(s) {
  if (!s) return '—';
  const slug = s.toLowerCase().replace(/[^a-z]+/g,'-').replace(/-+$/,'');
  return `<span class="pill pill-${slug}">${escapeHtml(s)}</span>`;
}
function pillContrato(c) {
  if (!c) return '—';
  return `<span class="pill pill-${c.toLowerCase()}">${escapeHtml(c)}</span>`;
}
function pillBloco(b) {
  if (!b) return '—';
  const slug = b.toLowerCase().replace(/[^a-z]+/g, '-');
  return `<span class="pill pill-bloco-${slug}">${escapeHtml(b)}</span>`;
}

let filtroFuncStatus = 'Todos';

function renderFuncionarios() {
  const data = PORTAL_DATA.funcionarios || [];

  // Stats
  const total = data.length;
  const ativos = data.filter(f => f.properties.Status === 'Ativo').length;
  const clt = data.filter(f => f.properties['Tipo de Contrato'] === 'CLT').length;
  const pj = data.filter(f => f.properties['Tipo de Contrato'] === 'PJ').length;
  $('stats-func').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${total}</div></div>
    <div class="stat-card"><div class="stat-label">Ativos</div><div class="stat-value">${ativos}</div></div>
    <div class="stat-card"><div class="stat-label">CLT</div><div class="stat-value">${clt}</div></div>
    <div class="stat-card"><div class="stat-label">PJ</div><div class="stat-value">${pj}</div></div>
  `;

  // Filtros
  const statusUnicos = ['Todos', ...new Set(data.map(f => f.properties.Status).filter(Boolean))];
  $('filtros-func').innerHTML = statusUnicos.map(s =>
    `<button class="filtro-tab${s === filtroFuncStatus ? ' active' : ''}" data-status="${escapeHtml(s)}">${escapeHtml(s)}</button>`
  ).join('');
  $('filtros-func').querySelectorAll('.filtro-tab').forEach(b => {
    b.addEventListener('click', () => {
      filtroFuncStatus = b.dataset.status;
      renderFuncionarios();
    });
  });

  // Tabela
  const visiveis = filtroFuncStatus === 'Todos' ? data : data.filter(f => f.properties.Status === filtroFuncStatus);
  const ordenado = [...visiveis].sort((a, b) => (a.properties.Nome || '').localeCompare(b.properties.Nome || ''));

  let html = `
    <thead><tr>
      <th>Nome</th><th>Cargo Atual</th><th>Status</th><th>Contrato</th>
      <th>Admissão</th><th>Email</th><th>Telefone</th>
      <th>CPF</th><th>RG</th>
      <th>Saúde</th><th>Odonto</th>
    </tr></thead><tbody>`;
  for (const f of ordenado) {
    const p = f.properties;
    html += `<tr>
      <td class="cell-strong">${escapeHtml(p.Nome || '—')}</td>
      <td>${escapeHtml(p._cargo_nome || '—')}</td>
      <td>${pillStatus(p.Status)}</td>
      <td>${pillContrato(p['Tipo de Contrato'])}</td>
      <td>${fmtDate(p['Data de Admissão'])}</td>
      <td class="cell-mono">${escapeHtml(p['Email Google'] || '—')}</td>
      <td class="cell-mono">${escapeHtml(p.Telefone || '—')}</td>
      <td class="cell-mono">${escapeHtml(p.CPF || '—')}</td>
      <td class="cell-mono">${escapeHtml(p.RG || '—')}</td>
      <td>${pillStatus(p['Convênio Saúde'] || 'Não Aderiu')}</td>
      <td>${pillStatus(p['Convênio Odonto'] || 'Não Aderiu')}</td>
    </tr>`;
  }
  html += '</tbody>';
  $('tbl-func').innerHTML = html;
}

let filtroCargosBloco = 'Todos';

function renderCargos() {
  const data = PORTAL_DATA.cargos || [];

  const total = data.length;
  const ativos = data.filter(c => c.properties['Status do Cargo'] === 'Ativo').length;
  const aberto = data.filter(c => c.properties['Status do Cargo'] === 'Em Aberto').length;
  $('stats-cargos').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${total}</div></div>
    <div class="stat-card"><div class="stat-label">Ativos</div><div class="stat-value">${ativos}</div></div>
    <div class="stat-card"><div class="stat-label">Em Aberto</div><div class="stat-value">${aberto}</div></div>
  `;

  const blocosUnicos = ['Todos', ...new Set(data.map(c => c.properties.Bloco).filter(Boolean))];
  $('filtros-cargos').innerHTML = blocosUnicos.map(b =>
    `<button class="filtro-tab${b === filtroCargosBloco ? ' active' : ''}" data-bloco="${escapeHtml(b)}">${escapeHtml(b)}</button>`
  ).join('');
  $('filtros-cargos').querySelectorAll('.filtro-tab').forEach(b => {
    b.addEventListener('click', () => {
      filtroCargosBloco = b.dataset.bloco;
      renderCargos();
    });
  });

  const visiveis = filtroCargosBloco === 'Todos' ? data : data.filter(c => c.properties.Bloco === filtroCargosBloco);
  const ordenado = [...visiveis].sort((a, b) => {
    const ba = (a.properties.Bloco || '').localeCompare(b.properties.Bloco || '');
    if (ba !== 0) return ba;
    return (a.properties.Cargo || '').localeCompare(b.properties.Cargo || '');
  });

  $('grid-cargos').innerHTML = ordenado.map(c => {
    const p = c.properties;
    return `<div class="cargo-card" data-id="${c.id}">
      <div class="cargo-card-title">${escapeHtml(p.Cargo || '—')}</div>
      <div class="cargo-card-meta">
        ${pillBloco(p.Bloco)}
        ${pillStatus(p['Status do Cargo'] || '')}
      </div>
      <div class="cargo-card-resumo">${escapeHtml(p['Resumo do Cargo'] || '')}</div>
    </div>`;
  }).join('');
  $('grid-cargos').querySelectorAll('.cargo-card').forEach(card => {
    card.addEventListener('click', () => abrirCargo(card.dataset.id));
  });
}

function abrirCargo(id) {
  const c = (PORTAL_DATA.cargos || []).find(x => x.id === id);
  if (!c) return;
  const p = c.properties;
  $('modal-title').textContent = p.Cargo || '—';
  $('modal-meta').innerHTML = `
    ${pillBloco(p.Bloco)}
    <span class="pill" style="background:rgba(255,255,255,0.06);color:var(--text-2);">${escapeHtml(p['Área'] || '')}</span>
    <span class="pill" style="background:rgba(255,255,255,0.06);color:var(--text-2);">${escapeHtml(p['Nível'] || '')}</span>
    ${pillStatus(p['Status do Cargo'] || '')}
  `;
  $('modal-body').innerHTML = c.html || '<p>Sem detalhes registrados.</p>';
  $('modal-overlay').classList.add('show');
}

function renderMov() {
  const data = PORTAL_DATA.movimentacoes || [];
  if (data.length === 0) {
    $('mov-content').innerHTML = `<div class="empty">
      <div class="ico">🔄</div>
      <div>Ainda não há movimentações registradas.</div>
      <div style="font-size:12px;margin-top:6px;">Admissões, desligamentos e promoções aparecem aqui quando lançadas no Notion.</div>
    </div>`;
    return;
  }
  const ord = [...data].sort((a, b) => {
    const da = (a.properties.Data && a.properties.Data.start) || '';
    const db = (b.properties.Data && b.properties.Data.start) || '';
    return db.localeCompare(da);
  });
  let html = '<div class="timeline">';
  for (const m of ord) {
    const p = m.properties;
    html += `<div class="timeline-item">
      <div class="timeline-date">${fmtDate(p.Data)} · ${escapeHtml(p.Tipo || '')}</div>
      <div class="timeline-title">${escapeHtml(p.Evento || '—')}</div>

        ${p.Motivo ? '<br/><em>' + escapeHtml(p.Motivo) + '</em>' : ''}

  }
  html += '</div>';
  $('mov-content').innerHTML = html;
}

  }
  html += '</tbody></table></div>';
  $('pops-content').innerHTML = html;
}

/* === INIT === */
function inicializar() {
  if (PORTAL_DATA.generated_at) {
    const dt = new Date(PORTAL_DATA.generated_at);
    $('last-updated').textContent = 'Atualizado ' + dt.toLocaleString('pt-BR');
  }
  renderFuncionarios();
  renderCargos();
  renderFolha();
  renderMov();
  renderPops();
}

checarSessao();
</script>
